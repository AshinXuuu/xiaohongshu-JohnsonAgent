<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KOS 任务中心 · 乔山销售助手</title>
<link rel="stylesheet" href="/assets/app.css" />
<style>
  .stats { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
  .stat { background:var(--card); border:1px solid var(--border-soft); border-radius:12px; box-shadow:var(--shadow); padding:14px 18px; flex:1; min-width:130px; }
  .stat .n { font-size:24px; font-weight:700; color:var(--accent-strong); }
  .stat .l { font-size:12px; color:var(--muted); margin-top:2px; }
  h2.sec { font-size:15px; margin:20px 0 12px; }
  .task { background:var(--card); border:1px solid var(--border-soft); border-radius:12px; box-shadow:var(--shadow); padding:16px 18px; margin-bottom:12px; }
  .task-top { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .task-name { font-weight:650; font-size:15px; }
  .muted2 { font-size:12.5px; color:var(--muted); }
  .prog { font-size:12.5px; color:var(--accent-strong); font-weight:600; }
  .task-act { margin-top:12px; display:flex; gap:10px; align-items:center; }
  .pill { font-size:11px; padding:2px 8px; border-radius:999px; background:#f0fdf4; color:#15803d; }

  /* 排行 */
  .board { background:var(--card); border:1px solid var(--border-soft); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; }
  .brow { display:flex; align-items:center; gap:12px; padding:10px 16px; border-top:1px solid var(--border-soft); font-size:13.5px; }
  .brow:first-child { border-top:none; }
  .brow .rank { width:24px; color:var(--muted); font-weight:600; }
  .brow .who { flex:1; }
  .brow .me { color:var(--accent-strong); font-weight:600; }

  /* 素材包弹窗 */
  .modal { position:fixed; inset:0; background:rgba(15,23,42,0.5); display:none; align-items:flex-start; justify-content:center; z-index:100; overflow:auto; padding:20px; }
  .modal.show { display:flex; }
  .pack { background:white; border-radius:14px; width:100%; max-width:560px; box-shadow:var(--shadow-md); }
  .pack h3 { margin:0; padding:16px 20px; border-bottom:1px solid var(--border-soft); font-size:15px; display:flex; align-items:center; }
  .pack h3 .x { margin-left:auto; cursor:pointer; color:var(--muted); font-size:20px; background:none; border:none; }
  .pack-body { padding:16px 20px; }
  .imgs { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .imgs figure { margin:0; }
  .imgs img { width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:8px; border:1px solid var(--border); background:var(--primary-soft); display:block; }
  .imgs figcaption { font-size:11px; color:var(--muted); text-align:center; margin-top:4px; }
  .imgs a { display:block; text-align:center; font-size:12px; color:var(--accent-strong); margin-top:3px; text-decoration:none; }
  .tip { font-size:12px; color:var(--muted); margin:10px 0; }
  .cbox { background:var(--primary-soft); border-radius:10px; padding:10px 12px; margin-top:10px; }
  .cbox .chead { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .cbox .t { font-weight:600; font-size:12.5px; color:var(--text-soft); }
  .cbox .copybtn { margin-left:auto; font-size:12px; padding:3px 10px; border:1px solid var(--border); background:white; border-radius:7px; cursor:pointer; color:var(--accent-strong); }
  .cbox .copybtn:hover { border-color:var(--accent); }
  .cbox .val { font-size:13px; white-space:pre-wrap; line-height:1.6; }
  .cbox .val.tags { color:var(--accent-strong); }
  .fillrow { display:flex; gap:8px; margin-top:14px; }
  .fillrow input { flex:1; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none; }
  .taken { display:flex; flex-direction:column; gap:8px; }
  .taken .item { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--border-soft); border-radius:10px; }
  .taken .item .lbl { font-weight:600; font-size:13.5px; }
  .taken .item .st { font-size:12px; }
  .taken .item .st.pub { color:#15803d; }
  .taken .item .st.no { color:var(--muted); }
  .backbtn { font-size:12.5px; color:var(--accent-strong); cursor:pointer; background:none; border:none; padding:0; margin-bottom:8px; }
  .linkline { font-size:12.5px; margin-top:12px; word-break:break-all; }
  .selfbox { background:var(--card); border:1px solid var(--border-soft); border-radius:12px; box-shadow:var(--shadow); padding:16px 18px; }
  .selfbox .item a { color:var(--accent-strong); word-break:break-all; text-decoration:none; }
  .selfbox .item .del { font-size:12px; color:var(--danger); background:none; border:1px solid var(--border); border-radius:7px; padding:4px 10px; cursor:pointer; }
  .deny { text-align:center; padding:60px 20px; color:var(--muted); }
</style>
</head>
<body>
<div id="appTopbar"></div>
<div class="container">
  <div id="content">
    <div class="stats">
      <div class="stat"><div class="n" id="sTask">–/–</div><div class="l">本期任务笔记(已完成/需完成)</div></div>
      <div class="stat"><div class="n" id="sSelf">–</div><div class="l">本期自发布笔记</div></div>
    </div>

    <h2 class="sec">待办任务</h2>
    <div id="tasks"><div class="muted2">加载中...</div></div>

    <h2 class="sec">自发布笔记</h2>
    <div class="selfbox">
      <div class="fillrow" style="margin-top:0">
        <input id="selfUrl" placeholder="粘贴小红书链接,登记你自发布的笔记" />
        <button class="btn btn-primary" onclick="submitSelf(this)">登记</button>
      </div>
      <div id="selfList" class="taken" style="margin-top:12px"></div>
    </div>

    <h2 class="sec">排行榜(本期)</h2>
    <div class="board" id="board"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="pack">
    <h3 id="packTitle">本篇素材包 <button class="x" onclick="closePack()">×</button></h3>
    <div class="pack-body" id="packBody"></div>
  </div>
</div>

<script src="/assets/app.js"></script>
<script>
const me = App.requireSession();
const esc = App.escapeHtml;

if (me) { App.mountTopbar({ active:'tasks' }); load(); }

async function api(action, extra) {
  return App.api('/api/kos', { method:'POST',
    body: Object.assign({ action, _user:{ department:me.department, name:me.name, emp_id:me.emp_id } }, extra||{}) });
}

async function load() {
  const [t, b, s, sp] = await Promise.all([
    api('my_tasks'), api('leaderboard'), api('summary'), api('my_self_posts')]);
  renderTasks((t.data && t.data.tasks) || []);
  renderBoard((b.data && b.data.board) || []);
  renderSummary(s.data || {});
  renderSelfList((sp.data && sp.data.posts) || []);
}

function renderSummary(s) {
  document.getElementById('sTask').textContent = `${s.task_done || 0}/${s.task_target || 0}`;
  document.getElementById('sSelf').textContent = s.self_done || 0;
}

let _tasks = [];
function renderTasks(tasks) {
  _tasks = tasks;
  document.getElementById('tasks').innerHTML = tasks.length ? tasks.map(taskRow).join('')
    : '<div class="muted2">暂无待办任务,等管理员发布。</div>';
  tasks.forEach(t => {
    const b1 = document.getElementById('take'+t.id); if (b1) b1.onclick = () => issue(t.id, b1);
    const b2 = document.getElementById('view'+t.id); if (b2) b2.onclick = () => viewTaken(t.id);
  });
}

// ───────── 自发布笔记登记 ─────────
async function submitSelf(btn) {
  const inp = document.getElementById('selfUrl');
  const url = (inp.value || '').trim();
  if (!url) { App.toast('请先粘贴小红书链接'); return; }
  if (!XHS_RE.test(url)) { App.toast('链接无效,请粘贴正确的小红书笔记链接。'); return; }
  btn.disabled = true; const o = btn.textContent; btn.textContent = '登记中...';
  const r = await api('self_publish', { note_url: url });
  btn.disabled = false; btn.textContent = o;
  if (!r.ok || r.data.error) { App.toast(r.data.error || '登记失败'); return; }
  inp.value = '';
  App.toast('已登记自发布笔记');
  load();
}
window.submitSelf = submitSelf;

function fmtDate(ms) {
  const d = new Date(ms); const p = n => String(n).padStart(2, '0');
  return `${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function renderSelfList(posts) {
  document.getElementById('selfList').innerHTML = posts.length ? posts.map(p => `
    <div class="item">
      <span class="st" style="color:var(--muted);min-width:78px">${fmtDate((p.created_at||0)*1000)}</span>
      <a href="${esc(p.note_url)}" target="_blank" rel="noopener" style="flex:1">${esc(p.note_url)}</a>
      <button class="del" onclick="delSelf(${p.id}, this)">删除</button>
    </div>`).join('') : '<div class="muted2">本期还没有登记自发布笔记。</div>';
}

async function delSelf(id, btn) {
  if (!confirm('确定删除这条自发布笔记登记?')) return;
  btn.disabled = true;
  const r = await api('delete_self_post', { id });
  if (!r.ok || r.data.error) { App.toast(r.data.error || '删除失败'); btn.disabled = false; return; }
  App.toast('已删除'); load();
}
window.delSelf = delSelf;

function taskRow(t) {
  const done = t.my_published >= t.per_person;
  const canTake = t.my_issued < t.per_person && t.remaining_cap > 0;
  const localN = getLocalPacks(t.id).length;
  return `<div class="task">
    <div class="task-top">
      <span class="task-name">${esc(t.title || (t.brand+' '+t.product))}</span>
      ${done ? '<span class="pill">已完成</span>' : ''}
      <span class="muted2">${esc(t.brand)} · ${esc(t.product)}${t.deadline?(' · 截止 '+esc(t.deadline)):''}</span>
    </div>
    <div class="task-act">
      <span class="prog">进度 ${t.my_published}/${t.per_person} 篇</span>
      <span class="muted2">已领 ${t.my_issued}</span>
      <span style="flex:1"></span>
      ${localN ? `<button class="btn" id="view${t.id}">已领素材包 (${localN})</button>` : ''}
      ${canTake ? `<button class="btn btn-primary" id="take${t.id}">领取新素材包</button>`
                : `<span class="muted2">${t.remaining_cap<=0?'素材已发尽':'已领满'}</span>`}
    </div>
  </div>`;
}

// ───────── 本地存储:已领素材包可重复查看 ─────────
function lkey() { return 'kospacks:' + (me.emp_id || ''); }
function allLocal() { try { return JSON.parse(localStorage.getItem(lkey()) || '{}'); } catch(e) { return {}; } }
function saveLocal(o) { try { localStorage.setItem(lkey(), JSON.stringify(o)); } catch(e){} }
function getLocalPacks(taskId) { return allLocal()[taskId] || []; }
function addLocalPack(taskId, pack) { const o = allLocal(); (o[taskId] = o[taskId] || []).push(pack); saveLocal(o); }
function updateLocalNote(taskId, packId, url) {
  const o = allLocal(); (o[taskId] || []).forEach(p => { if (p.pack_id === packId) p.note_url = url; }); saveLocal(o);
}

async function issue(taskId, btn) {
  btn.disabled = true; btn.textContent = '生成中...(约10秒)';
  const r = await api('issue', { task_id: taskId });
  btn.disabled = false; btn.textContent = '领取新素材包';
  if (!r.ok || r.data.error) { App.toast(r.data.error || '领取失败'); return; }
  const d = r.data;
  const pack = { pack_id: d.pack_id, post_index: d.post_index, per_person: d.per_person,
                 images: d.images, copy: d.copy || {}, task_id: taskId, note_url: '', at: Date.now() };
  addLocalPack(taskId, pack);
  showPack(pack, taskId, false);
  load();
}

const KINDS = [['cover','主图'], ['two','2合1'], ['four','4合1']];

// 已领列表
function viewTaken(taskId) {
  const packs = getLocalPacks(taskId);
  const t = _tasks.find(x => x.id === taskId);
  document.getElementById('packTitle').innerHTML = '已领素材包 <button class="x" onclick="closePack()">×</button>';
  document.getElementById('packBody').innerHTML = `
    <div class="muted2" style="margin-bottom:10px">${esc((t&&(t.title||(t.brand+' '+t.product)))||'')} · 共 ${packs.length} 份</div>
    <div class="taken">
      ${packs.map((p, i) => `
        <div class="item">
          <span class="lbl">第 ${p.post_index || i+1} 篇</span>
          <span class="st ${p.note_url?'pub':'no'}">${p.note_url?'已回填链接':'未回填'}</span>
          <span style="flex:1"></span>
          <button class="btn" onclick="openTaken(${taskId}, ${i})">查看 / 回填</button>
        </div>`).join('')}
    </div>`;
  document.getElementById('modal').classList.add('show');
}
window.viewTaken = viewTaken;
function openTaken(taskId, i) { showPack(getLocalPacks(taskId)[i], taskId, true); }
window.openTaken = openTaken;

function showPack(p, taskId, fromList) {
  const c = p.copy || {};
  const title = (c.titles && c.titles[0]) || '';
  const body = c.body || '';
  const tags = (c.tags || []).join(' ');
  document.getElementById('packTitle').innerHTML = '素材包 <button class="x" onclick="closePack()">×</button>';
  document.getElementById('packBody').innerHTML = `
    ${fromList ? `<button class="backbtn" onclick="viewTaken(${taskId})">← 返回已领列表</button>` : ''}
    <div class="muted2">第 ${p.post_index}/${p.per_person} 篇 · 长按图片保存到手机</div>
    <div class="imgs">
      ${KINDS.map(([k,label]) => `
        <figure>
          <img src="${esc(p.images[k])}" alt="${label}" />
          <a href="${esc(p.images[k])}" download="kos_${p.pack_id}_${k}">下载</a>
        </figure>`).join('')}
    </div>
    <div class="tip">手机长按图片即可保存;电脑可点「下载」。</div>

    <div class="cbox">
      <div class="chead"><span class="t">标题</span><button class="copybtn" onclick="copyText(this)" data-c="${esc(title)}">复制标题</button></div>
      <div class="val">${esc(title) || '<span style="color:var(--muted)">(无)</span>'}</div>
    </div>
    <div class="cbox">
      <div class="chead"><span class="t">正文</span><button class="copybtn" onclick="copyText(this)" data-c="${esc(body)}">复制正文</button></div>
      <div class="val">${esc(body) || '<span style="color:var(--muted)">(无)</span>'}</div>
    </div>
    <div class="cbox">
      <div class="chead"><span class="t">标签</span><button class="copybtn" onclick="copyText(this)" data-c="${esc(tags)}">复制标签</button></div>
      <div class="val tags">${esc(tags) || '<span style="color:var(--muted)">(无)</span>'}</div>
    </div>

    <div style="margin-top:16px;border-top:1px solid var(--border-soft);padding-top:12px">
      <div class="t" style="font-weight:600;font-size:13px">发布后回收笔记链接</div>
      ${p.note_url ? `<div class="linkline">已回填:<a href="${esc(p.note_url)}" target="_blank" rel="noopener">${esc(p.note_url)}</a></div>` : ''}
      <div class="fillrow">
        <input id="noteUrl" placeholder="粘贴小红书链接" value="${esc(p.note_url||'')}" />
        <button class="btn btn-primary" onclick="completePack(${p.pack_id}, ${taskId}, this)">回收链接</button>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('show');
}
window.showPack = showPack;

function closePack() { document.getElementById('modal').classList.remove('show'); }
window.closePack = closePack;

async function copyText(btn) {
  const txt = btn.getAttribute('data-c') || '';
  if (!txt) { App.toast('内容为空'); return; }
  try { await navigator.clipboard.writeText(txt); const o = btn.textContent; btn.textContent = '已复制'; setTimeout(()=>btn.textContent=o, 1500); }
  catch(e){ App.toast('复制失败,请手动选择'); }
}
window.copyText = copyText;

const XHS_RE = /(?:xhslink\.com|xiaohongshu\.com)/i;
async function completePack(packId, taskId, btn) {
  const url = (document.getElementById('noteUrl').value || '').trim();
  if (!url) { App.toast('请先粘贴笔记链接'); return; }
  if (!XHS_RE.test(url)) { App.toast('链接无效,请粘贴正确的小红书笔记链接。'); return; }
  btn.disabled = true; const o = btn.textContent; btn.textContent = '提交中...';
  const r = await api('complete', { pack_id: packId, note_url: url });
  btn.disabled = false; btn.textContent = o;
  if (!r.ok || r.data.error) { App.toast(r.data.error || '提交失败'); return; }
  updateLocalNote(taskId, packId, url);
  App.toast('已回收链接,计入统计');
  load();
  showPack(getLocalPacks(taskId).find(x => x.pack_id === packId) || {}, taskId, true);
}
window.completePack = completePack;

function renderBoard(board) {
  const me_emp = me.emp_id;
  document.getElementById('board').innerHTML = board.length ? board.map((b,i) => {
    const mine = b.emp_id === me_emp;
    return `<div class="brow">
      <span class="rank">${i+1}</span>
      <span class="who ${mine?'me':''}">${esc(b.name||'')} ${esc(b.department||'')}${mine?'(我)':''}</span>
      <span class="muted2">任务完成 ${b.task_notes||0} · 自发布 ${b.self_notes||0}</span>
    </div>`;
  }).join('') : '<div class="brow muted2">本期还没有人上榜,快来抢第一</div>';
}
</script>
</body>
</html>
