<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>乔山销售助手 · 工作台</title>
<style>
  :root {
    --primary: #1e293b;
    --primary-soft: #f1f5f9;
    --primary-hover: #0f172a;
    --bg: #fafaf9;
    --card: #ffffff;
    --text: #18181b;
    --text-soft: #3f3f46;
    --muted: #71717a;
    --border: #e4e4e7;
    --border-soft: #f4f4f5;
    --shadow:    0 1px 2px rgba(15,23,42,0.04);
    --shadow-md: 0 4px 12px rgba(15,23,42,0.06);
    --shadow-lg: 0 16px 48px rgba(15,23,42,0.08);
    --accent: #6366f1;
    --accent-soft: #eef2ff;
    --pink: #ec4899;
    --pink-soft: #fdf2f8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ─── 登录视图 ─────────────────────────────────── */
  .login-bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #fafaf9 0%, #f1f5f9 50%, #eef2ff 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
  }
  .login-card {
    background: white;
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 36px 32px 28px;
    width: 100%;
    max-width: 420px;
  }
  .login-card h1 {
    font-size: 22px;
    margin: 0 0 4px;
    text-align: center;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .login-card h1 .brand-mark {
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .login-card .hint {
    color: var(--muted);
    text-align: center;
    margin: 0 0 26px;
    font-size: 13px;
  }
  .login-card label {
    display: block;
    font-size: 12.5px;
    color: var(--muted);
    margin: 14px 0 6px;
    font-weight: 500;
  }
  .login-card label:first-of-type { margin-top: 0; }
  .login-card select, .login-card input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: white;
    color: var(--text);
    transition: all 0.15s;
  }
  .login-card select:focus, .login-card input:focus {
    outline: none;
    border-color: #a5b4fc;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
  }
  .login-submit {
    width: 100%;
    padding: 12px;
    margin-top: 22px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .login-submit:hover { background: var(--primary-hover); }
  .login-submit:disabled { background: var(--border); cursor: not-allowed; color: var(--muted); }
  .login-error {
    margin-top: 14px; padding: 10px 14px;
    background: #fef2f2; color: #991b1b;
    font-size: 13px; border-radius: 8px;
    border: 1px solid #fecaca;
    display: none;
  }
  .login-error.show { display: block; }
  .login-foot {
    text-align: center;
    margin-top: 18px;
    font-size: 11.5px;
    color: var(--muted);
  }

  /* ─── 工作台门户视图 ─────────────────────────────── */
  .portal-shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .portal-bar {
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border-soft);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .portal-bar h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .portal-bar h1 .dot { color: var(--accent); }
  .portal-bar .spacer { flex: 1; }
  .portal-bar .me {
    color: var(--muted);
    font-size: 12.5px;
  }
  .portal-bar .logout {
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 7px;
    font-size: 12.5px;
    cursor: pointer;
    color: var(--text-soft);
    font-weight: 500;
    font-family: inherit;
  }
  .portal-bar .logout:hover { background: var(--primary-soft); }

  .portal-main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .portal-inner {
    width: 100%;
    max-width: 980px;
    text-align: center;
  }
  .portal-greeting {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  .portal-greeting .name { color: var(--accent); }
  .portal-sub {
    font-size: 14px;
    color: var(--muted);
    margin: 0 0 36px;
  }
  .portal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    opacity: 0;                       /* 卡片渲染好前先隐藏,避免闪旧静态卡片 */
    transition: opacity 0.2s ease;
  }
  .portal-grid.ready { opacity: 1; }
  @media (max-width: 720px) { .portal-grid { grid-template-columns: 1fr; } }

  /* ─── 移动端专项 ────────────────────────────── */
  @media (max-width: 600px) {
    /* 登录卡片在手机上更紧凑 */
    .login-bg { padding: 16px; }
    .login-card { padding: 28px 22px 22px; border-radius: 14px; }
    .login-card h1 { font-size: 19px; }
    .login-card .hint { font-size: 12.5px; margin-bottom: 20px; }
    .login-card label { font-size: 12px; margin: 12px 0 5px; }
    .login-card select, .login-card input { font-size: 16px; padding: 11px 12px; } /* 16px 防 iOS Safari 缩放 */
    .login-submit { padding: 13px; font-size: 15px; }

    /* 工作台门户 */
    .portal-bar { padding: 8px 14px; height: auto; flex-wrap: wrap; }
    .portal-bar h1 { font-size: 14px; }
    .portal-bar .me { font-size: 11.5px; width: 100%; order: 99; padding-top: 4px; }
    .portal-bar .logout { padding: 5px 10px; font-size: 12px; }

    .portal-main { padding: 24px 16px; }
    .portal-greeting { font-size: 22px; margin-bottom: 6px; }
    .portal-sub { font-size: 13px; margin-bottom: 24px; }
    .portal-grid { gap: 14px; }
    .portal-card { padding: 24px 22px; border-radius: 14px; }
    .portal-card .icon-wrap { width: 48px; height: 48px; font-size: 24px; margin-bottom: 14px; }
    .portal-card .title { font-size: 17px; }
    .portal-card .desc { font-size: 13px; line-height: 1.55; }
  }

  .portal-card {
    background: white;
    border-radius: 16px;
    padding: 36px 28px;
    border: 1px solid var(--border-soft);
    box-shadow: var(--shadow);
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .portal-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    border-color: var(--border);
  }
  .portal-card .badge {
    align-self: flex-start;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    margin-bottom: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  /* 配置驱动卡片:颜色由内联 --card-* 变量决定(静态卡片仍走下方 .qa/.gen/.lib 变体)*/
  .portal-card .badge { background: var(--card-soft, var(--accent-soft)); color: var(--card-strong, #4338ca); }
  .portal-card .cta { color: var(--card-accent, var(--accent)); }
  .portal-card.qa .badge {
    background: var(--accent-soft);
    color: #4338ca;
  }
  .portal-card.gen .badge {
    background: var(--pink-soft);
    color: #be185d;
  }
  .portal-card.lib .badge {
    background: #f0fdfa;
    color: #0f766e;
  }
  .portal-card .icon-wrap {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    font-size: 28px;
    box-shadow: var(--shadow);
  }
  .portal-card.qa .icon-wrap {
    background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
  }
  .portal-card.gen .icon-wrap {
    background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
  }
  .portal-card .title {
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .portal-card .desc {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 16px;
    flex: 1;
  }
  .portal-card .cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    margin-top: auto;
  }
  .portal-card.qa .cta { color: var(--accent); }
  .portal-card.gen .cta { color: var(--pink); }
  .portal-card.lib .cta { color: #0d9488; }
  .portal-card .arrow {
    transition: transform 0.2s;
  }
  .portal-card:hover .arrow { transform: translateX(4px); }

  /* admin 入口低调一些 */
  .portal-extras {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    gap: 16px;
    font-size: 12.5px;
  }
  .portal-extras a {
    color: var(--muted);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .portal-extras a:hover {
    color: var(--text);
    background: var(--primary-soft);
  }

  /* ── 版本徽章 + 更新公告 ── */
  .version-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 11px;
    font-size: 12px;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #818cf8, #6366f1);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(99,102,241,0.35);
    transition: transform .15s, box-shadow .15s;
    font-family: inherit;
  }
  .version-badge:hover {
    transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(99,102,241,0.45);
  }

  /* 版本公告 modal */
  .ver-modal-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,0.5);
    display: none; align-items: flex-start; justify-content: center;
    z-index: 1500; padding: 30px 20px; overflow-y: auto;
  }
  .ver-modal-overlay.show { display: flex; }
  .ver-modal-card {
    background: white; border-radius: 14px;
    max-width: 720px; width: 100%; max-height: calc(100vh - 60px);
    display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(15,23,42,0.18);
  }
  .ver-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px; border-bottom: 1px solid var(--border-soft);
  }
  .ver-modal-header h2 {
    margin: 0; font-size: 17px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .ver-modal-close {
    background: transparent; border: none; font-size: 22px; cursor: pointer; color: var(--muted);
    width: 32px; height: 32px; line-height: 1;
  }
  .ver-modal-close:hover { color: var(--text); }
  .ver-modal-body { padding: 22px; overflow-y: auto; flex: 1; }

  .ver-block { margin-bottom: 28px; }
  .ver-block:last-child { margin-bottom: 0; }
  .ver-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .ver-num {
    font-size: 17px; font-weight: 700; color: var(--accent);
    background: var(--accent-soft); padding: 2px 12px; border-radius: 7px;
  }
  .ver-num.old { color: var(--muted); background: var(--primary-soft); }
  .ver-date { font-size: 12px; color: var(--muted); }
  .ver-title { font-size: 15px; font-weight: 600; color: var(--text); margin: 8px 0 4px; letter-spacing: -0.005em; }
  .ver-intro { font-size: 13px; color: var(--muted); margin: 0 0 14px; line-height: 1.65; }
  .ver-hl { display: flex; gap: 12px; padding: 11px 0; border-top: 1px solid var(--border-soft); }
  .ver-hl:first-of-type { border-top: none; }
  .ver-hl-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
  .ver-hl-body { flex: 1; }
  .ver-hl-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .ver-hl-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .ver-tech {
    margin-top: 14px; background: var(--primary-soft); border: 1px solid var(--border-soft);
    border-radius: 10px; padding: 4px 0;
  }
  .ver-tech summary {
    cursor: pointer; padding: 10px 14px; font-size: 12.5px;
    font-weight: 600; color: var(--muted); list-style: none;
  }
  .ver-tech summary::-webkit-details-marker { display: none; }
  .ver-tech summary::before { content: '▸ '; }
  .ver-tech[open] summary::before { content: '▾ '; }
  .ver-tech ul { margin: 0; padding: 0 18px 12px 34px; }
  .ver-tech li { font-size: 12px; color: var(--muted); line-height: 1.75; }
  .ver-divider { border: none; border-top: 1px dashed var(--border); margin: 0 0 24px; }

  @media (max-width: 600px) {
    .ver-modal-overlay { padding: 16px 12px; }
    .ver-modal-card { border-radius: 12px; }
    .ver-modal-header { padding: 14px 18px; }
    .ver-modal-header h2 { font-size: 15px; }
    .ver-modal-body { padding: 16px; }
    .ver-num { font-size: 15px; }
    .ver-title { font-size: 14px; }
  }
</style>
</head>
<body>

<!-- 登录视图 -->
<div class="login-bg" id="loginView" style="display:none">
  <div class="login-card">
    <h1><span class="brand-mark">乔山销售助手</span></h1>
    <p class="hint">请用工号 + 身份证后 6 位登录</p>

    <label for="loginDept">部门</label>
    <select id="loginDept"><option value="">加载中...</option></select>

    <label for="loginName">姓名</label>
    <select id="loginName" disabled><option value="">请先选择部门</option></select>

    <label for="loginEmpId">工号</label>
    <input id="loginEmpId" type="text" inputmode="numeric" autocomplete="off" placeholder="请输入工号" />

    <label for="loginId6">身份证后 6 位<span style="color:var(--muted);font-weight:400">(部分部门可不填)</span></label>
    <input id="loginId6" type="text" maxlength="6" autocomplete="off" placeholder="没有的可留空" />

    <button class="login-submit" id="loginBtn" onclick="doLogin()">登录</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-foot">乔山健身内部工具 · 仅限授权员工使用</div>
  </div>
</div>

<!-- 版本公告 modal -->
<div class="ver-modal-overlay" id="versionModal" onclick="closeVersionModal(event)">
  <div class="ver-modal-card" onclick="event.stopPropagation()">
    <div class="ver-modal-header">
      <h2>更新公告</h2>
      <button class="ver-modal-close" onclick="closeVersionModal()">×</button>
    </div>
    <div class="ver-modal-body" id="versionBody"></div>
  </div>
</div>

<!-- 工作台门户视图 -->
<div class="portal-shell" id="portalView" style="display:none">
  <div class="portal-bar">
    <h1>乔山销售助手 <span class="dot">·</span> 工作台</h1>
    <div class="spacer"></div>
    <button class="version-badge" id="versionBadge" onclick="openVersionModal()">v3.2 新</button>
    <span class="me" id="meLabel"></span>
    <button class="logout" onclick="logout()">退出</button>
  </div>

  <div class="portal-main">
    <div class="portal-inner">
      <h2 class="portal-greeting">您好,<span class="name" id="greetName"></span></h2>
      <p class="portal-sub">请选择需要的工具开始工作</p>

      <div class="portal-grid" id="portalGrid">
        <a class="portal-card qa" href="/qa.html">
          <span class="badge">售前 / 售后</span>
          
          <div class="title">销售问答助手</div>
          <div class="desc">基于产品说明书 + 卖点资料的严格问答,业务现场被客户提问时秒查答案,并附带销售话术建议。</div>
          <div class="cta">进入 <span class="arrow">→</span></div>
        </a>

        <a class="portal-card gen" href="/index.html">
          <span class="badge">内容创作</span>

          <div class="title">小红书文案生成助手</div>
          <div class="desc">选品牌、选产品、选类型,一键生成种草 / 场景 / 干货 / 促销文案 + 配套封面图,复制即用。</div>
          <div class="cta">进入 <span class="arrow">→</span></div>
        </a>

        <a class="portal-card lib" href="/library.html">
          <span class="badge">资料下载</span>

          <div class="title">产品资料库</div>
          <div class="desc">按品牌、产品在线下载单页、中英文说明书等原始资料,随时发给客户,无需到处找文件。</div>
          <div class="cta">进入 <span class="arrow">→</span></div>
        </a>
      </div>

      <div class="portal-extras" id="extras"></div>
    </div>
  </div>
</div>

<script src="/assets/app.js"></script>
<script>
const USER_KEY = 'xhsAgent:user';
// 会话有效期:24 小时。每次登录刷新一次。超过这个时间强制重登。
const SESSION_TTL_MS = 24 * 60 * 60 * 1000;
const $ = id => document.getElementById(id);

function escapeHtml(s) { return App.escapeHtml(s); }   // 收口:统一 app.js 实现
function getMe() {
  try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); }
  catch (_) { return null; }
}
function setMe(u) {
  // 写入时打上时间戳
  u.loginAt = Date.now();
  localStorage.setItem(USER_KEY, JSON.stringify(u));
}
function isSessionValid(me) {
  if (!me || !me.emp_id || !me.loginAt) return false;
  return (Date.now() - me.loginAt) < SESSION_TTL_MS;
}

// ─────────── 路由:已登录且未过期 → 门户;否则 → 登录 ───────────
function route() {
  const me = getMe();
  if (isSessionValid(me)) {
    showPortal(me);
  } else {
    // 过期或无登录态,清掉(顺便阻止旧版无 loginAt 字段的用户用 cookie 漂浮)
    if (me) localStorage.removeItem(USER_KEY);
    showLogin();
  }
}

// ─────────── 登录视图 ───────────
let usersByDept = {};

async function showLogin() {
  $('loginView').style.display = '';
  $('portalView').style.display = 'none';
  try {
    const resp = await fetch('/api/login');
    const data = await resp.json();
    usersByDept = data.users_by_dept || {};
    const departments = data.departments || [];
    const deptSel = $('loginDept');
    deptSel.innerHTML = '<option value="">请选择部门</option>' +
      departments.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
    deptSel.addEventListener('change', onDeptChange);
    $('loginEmpId').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
    $('loginId6').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
  } catch (e) {
    showLoginError('加载部门列表失败:' + e.message);
  }
}
function onDeptChange() {
  const dept = $('loginDept').value;
  const sel = $('loginName');
  if (!dept) {
    sel.disabled = true;
    sel.innerHTML = '<option value="">请先选择部门</option>';
    return;
  }
  const users = usersByDept[dept] || [];
  sel.disabled = false;
  sel.innerHTML = '<option value="">请选择姓名</option>' +
    users.map(u => `<option value="${escapeHtml(u.name)}">${escapeHtml(u.name)}</option>`).join('');
}
function showLoginError(msg) {
  const err = $('loginError');
  err.textContent = msg;
  err.classList.add('show');
}
function hideLoginError() {
  $('loginError').classList.remove('show');
}
async function doLogin() {
  const dept = $('loginDept').value;
  const name = $('loginName').value;
  const empId = $('loginEmpId').value.trim();
  // 身份证最后一位可能是 X(校验位),统一转大写,允许末位 0-9 或 X
  const id6 = $('loginId6').value.trim().toUpperCase();
  hideLoginError();
  if (!dept || !name || !empId) {
    showLoginError('请把部门、姓名、工号填完整');
    return;
  }
  if (id6 && !/^\d{5}[\dX]$/.test(id6)) {
    showLoginError('身份证后 6 位格式不对(末位可为 X);没有的可留空');
    return;
  }
  const btn = $('loginBtn');
  btn.disabled = true;
  btn.textContent = '验证中...';
  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({department:dept, name, emp_id:empId, id_last6:id6})
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      showLoginError(data.error || '登录失败');
      return;
    }
    setMe(data.user);
    if (data.token) { try { App.setToken(data.token); } catch (_) { localStorage.setItem('xhsAgent:token', data.token); } }
    showPortal(data.user);
  } catch (e) {
    showLoginError('网络错误:' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '登录';
  }
}
window.doLogin = doLogin;

function showPortal(me) {
  $('loginView').style.display = 'none';
  $('portalView').style.display = '';
  $('greetName').textContent = me.name;
  $('meLabel').textContent = `${me.department} · 工号 ${me.emp_id}`;
  // 管理员显示一个低调的后台入口
  if (me.is_admin) {
    $('extras').innerHTML = `<a href="/admin.html">管理员后台</a>`;
  }
  // 模块卡片改为读组织配置渲染(白标就绪);拉取失败则保留页面里的静态卡片兜底
  renderPortalCards(me);

  maybeShowVersionModal();
}

// 按组织配置 + 角色渲染模块卡片
async function renderPortalCards(me) {
  const grid = $('portalGrid');
  if (!grid) return;
  try {
    if (window.App) {
      const org = await App.loadOrg();
      const role = App.roleOf(me);
      const mods = (org.modules || []).filter(m =>
        m.enabled !== false && (!m.roles || m.roles.indexOf(role) !== -1));
      if (mods.length) {
        grid.innerHTML = mods.map(m => {
          const style = `--card-accent:${m.color || '#6366f1'};` +
                        `--card-soft:${m.color_soft || '#eef2ff'};` +
                        `--card-strong:${m.color_strong || '#4338ca'}`;
          return `<a class="portal-card" style="${style}" href="${escapeHtml(m.href)}">
              <span class="badge">${escapeHtml(m.badge || '')}</span>
              <div class="title">${escapeHtml(m.title || m.name || '')}</div>
              <div class="desc">${escapeHtml(m.desc || '')}</div>
              <div class="cta">进入 <span class="arrow">→</span></div>
            </a>`;
        }).join('');
      }
    }
  } catch (e) {
    // 静默:配置拉取失败时保留静态兜底卡片
  } finally {
    grid.classList.add('ready');   // 无论走配置还是兜底,渲染完成后淡入,避免闪旧卡片
  }
}
function logout() {

  localStorage.removeItem(USER_KEY);
  try { App.clearToken(); } catch (_) { localStorage.removeItem('xhsAgent:token'); }
  location.reload();
}

  $('versionBody').innerHTML = html;
