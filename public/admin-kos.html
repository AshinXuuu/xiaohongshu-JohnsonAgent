<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>任务创建 · 乔山销售助手</title>
<link rel="stylesheet" href="/assets/app.css" />
<style>
  .subbar { display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-bottom:16px; }
  .subbar .back { margin-right:auto; }
  h2.sec { font-size:15px; margin:24px 0 12px; }
  .card2 { background:var(--card); border:1px solid var(--border-soft); border-radius:12px; box-shadow:var(--shadow); padding:16px 18px; margin-bottom:14px; }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
  .fld { display:flex; flex-direction:column; gap:4px; }
  label { font-size:11.5px; color:var(--muted); }
  input, select, textarea { padding:8px 11px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:white; outline:none; font-family:inherit; }
  input:focus, select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .lib, .task { border:1px solid var(--border-soft); border-radius:10px; padding:12px 14px; margin-bottom:10px; }
  .lib-head, .task-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .lib-name { font-weight:650; font-size:14px; }
  .muted2 { font-size:12px; color:var(--muted); }
  .cap-bar { height:7px; border-radius:99px; background:var(--border-soft); overflow:hidden; flex:1; min-width:120px; max-width:260px; }
  .cap-fill { height:100%; background:var(--accent); }
  .pill { font-size:11px; padding:2px 8px; border-radius:999px; background:var(--accent-soft); color:var(--accent-strong); }
  .pill.warn { background:#fffbeb; color:#b45309; }
  .pill.ok { background:#f0fdf4; color:#15803d; }
  .mini { padding:5px 11px; border:1px solid var(--border); background:white; border-radius:7px; font-size:12.5px; cursor:pointer; color:var(--text-soft); }
  .mini:hover { background:var(--primary-soft); }
  .mini.danger { color:var(--danger); }
  .mini.danger:hover { background:#fef2f2; border-color:var(--danger); }
  .lib-actions { margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .path { font-family:ui-monospace,monospace; font-size:12px; background:var(--primary-soft); padding:2px 7px; border-radius:6px; word-break:break-all; }
  .depts { display:flex; flex-wrap:wrap; gap:6px 14px; margin-top:4px; }
  .depts label { font-size:13px; color:var(--text-soft); display:flex; align-items:center; gap:4px; }
  .deny { text-align:center; padding:60px 20px; color:var(--muted); }
</style>
</head>
<body>
<div id="appTopbar"></div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:none" />
<div class="container">
  <div id="content">
    <div class="subbar">
      <a class="btn back" href="/admin.html">← 数据看板</a>
      <span class="muted2" id="topinfo"></span>
    </div>

    <h2 class="sec">素材库 <button class="mini" id="libRefresh" style="font-weight:normal;margin-left:8px">↻ 刷新桶内数量</button></h2>
    <div class="muted2" id="syncNote" style="margin:-6px 0 10px"></div>
    <div class="card2">
      <div class="row">
        <div class="fld"><label>品牌</label><select id="lbBrand"></select></div>
        <div class="fld"><label>产品</label><select id="lbProduct"></select></div>
        <button class="btn btn-primary" id="lbAdd">新建素材库</button>
      </div>
      <div class="muted2" id="lbHint" style="margin-top:8px">建库自动用「品牌 / 产品 / 日期时间」命名,不会重名。</div>
    </div>
    <div id="libs"><div class="muted2">加载中...</div></div>
    <div id="libsPager" style="margin-top:10px"></div>

    <h2 class="sec">任务</h2>
    <div class="card2">
      <div class="row">
        <div class="fld" style="flex:1; min-width:180px"><label>任务标题(可空)</label><input id="tkTitle" placeholder="不填则自动用 品牌+产品" /></div>
        <div class="fld"><label>绑定素材库</label><select id="tkLib"></select></div>
        <div class="fld"><label>每人发几篇</label><input id="tkPer" type="number" min="1" value="1" style="width:90px" /></div>
        <div class="fld"><label>截止日期</label><input id="tkDeadline" type="date" /></div>
      </div>
      <div style="margin-top:10px">
        <label>发给</label>
        <div class="row" style="margin-top:4px">
          <select id="tkScope"><option value="all">全员</option><option value="dept">指定部门</option></select>
          <div class="depts" id="tkDepts" style="display:none"></div>
        </div>
      </div>
      <div style="margin-top:12px"><button class="btn btn-primary" id="tkAdd">发布任务</button></div>
    </div>
    <div id="tasks"><div class="muted2">加载中...</div></div>
    <div id="tasksPager" style="margin-top:10px"></div>
  </div>
</div>

<script src="/assets/app.js"></script>
<script>
const me = App.requireSession();
const esc = App.escapeHtml;
let libraries = [], departments = [], productMap = {};

if (me) {
  App.mountTopbar();
  if (!['org_admin','super_admin'].includes(App.roleOf(me))) {
    document.getElementById('content').innerHTML =
      '<div class="deny"><h2>无权访问</h2><p>任务创建仅向管理员开放。</p><p><a href="/">← 返回工作台</a></p></div>';
  } else { init(); }
}

async function api(action, extra) {
  return App.api('/api/kos-admin', { method:'POST',
    body: Object.assign({ action }, extra||{}) });
}

async function init() {
  // 部门列表(给指定部门用)
  try { const r = await App.api('/api/login'); departments = (r.data && r.data.departments) || []; } catch(e){}
  document.getElementById('tkDepts').innerHTML = departments.map(d =>
    `<label><input type="checkbox" value="${esc(d)}" />${esc(d)}</label>`).join('');
  await loadProductCatalog();
  await loadLibs();
  await loadTasks();
}

// 产品目录 → 品牌/产品下拉(和产品目录完全一致,保证文案能找到)
async function loadProductCatalog() {
  try {
    const r = await App.api('/api/products');
    const brands = (r.data && r.data.brands) || [];
    productMap = {};
    brands.forEach(b => { productMap[b.name] = (b.products || []).map(p => p.name); });
    const bsel = document.getElementById('lbBrand');
    bsel.innerHTML = Object.keys(productMap).map(b => `<option value="${esc(b)}">${esc(b)}</option>`).join('');
    bsel.onchange = fillProducts;
    fillProducts();
  } catch (e) {}
}
function fillProducts() {
  const b = document.getElementById('lbBrand').value;
  document.getElementById('lbProduct').innerHTML =
    (productMap[b] || []).map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
}

async function loadLibs(force) {
  const r = await api('list_libraries', force ? { force: 1 } : {});
  libraries = (r.data && r.data.libraries) || [];
  const synced = !!(r.data && r.data.cos_synced);
  const cosErr = r.data && r.data.cos_error;
  const note = document.getElementById('syncNote');
  if (note) {
    note.textContent = synced
      ? '数量已与 COS 桶实时对齐(打开或刷新即自动同步,新上传自动登记、桶内删除自动下架)。'
      : '⚠ 暂时读取不到 COS,当前数量为上次记录,可能与桶内实际不一致。' + (cosErr ? '(原因:' + cosErr + ')' : '');
    note.style.color = synced ? 'var(--muted)' : 'var(--danger)';
  }
  // 任务表单的库下拉
  document.getElementById('tkLib').innerHTML = libraries.map(l =>
    `<option value="${l.id}">${esc(l.brand)} ${esc(l.product)}${l.code ? ' · '+esc(l.code) : ''}（容量${l.capacity.remaining}）</option>`).join('') || '<option value="">先建素材库</option>';
  drawLibs();
}

let _libPage = 0;
function drawLibs() {
  const pg = App.paginate(libraries, _libPage);
  _libPage = pg.page;
  document.getElementById('libs').innerHTML = pg.rows.length ? pg.rows.map(libRow).join('') : '<div class="muted2">还没有素材库</div>';
  App.renderPager('libsPager', pg.page, pg.pages, p => { _libPage = p; drawLibs(); });
}

function libRow(l) {
  const cap = l.capacity;
  const pct = cap.total ? Math.round(cap.used/cap.total*100) : 0;
  const okTwo = cap.two >= 2, okFour = cap.four >= 4, okMain = cap.mains >= 1;
  return `<div class="lib">
    <div class="lib-head">
      <span class="lib-name">${esc(l.brand)} ${esc(l.product)}</span>
      ${l.code ? `<span class="muted2">${esc(l.code)}</span>` : ''}
      <span class="pill ${okMain?'ok':'warn'}">主图 ${cap.mains}${okMain?'':' (需≥1)'}</span>
      ${cap.mode === 'legacy' && (cap.two > 0 || cap.four > 0) ? `
      <span class="pill ${okTwo?'ok':'warn'}">2合1横版 ${cap.two}${okTwo?'':' (需≥2)'}</span>
      <span class="pill ${okFour?'ok':'warn'}">4合1竖版 ${cap.four}${okFour?'':' (需≥4)'}</span>
      <span class="pill warn">旧版三分类库</span>` : `
      <span class="pill ${(cap.two_near||0)>=1?'ok':'warn'}">横近 ${cap.two_near||0}${(cap.two_near||0)>=1?'':' (需≥1)'}</span>
      <span class="pill ${(cap.two_far||0)>=1?'ok':'warn'}">横远 ${cap.two_far||0}${(cap.two_far||0)>=1?'':' (需≥1)'}</span>
      <span class="pill ${(cap.four_near||0)>=2?'ok':'warn'}">竖近 ${cap.four_near||0}${(cap.four_near||0)>=2?'':' (需≥2)'}</span>
      <span class="pill ${(cap.four_far||0)>=2?'ok':'warn'}">竖远 ${cap.four_far||0}${(cap.four_far||0)>=2?'':' (需≥2)'}</span>`}
      <div class="cap-bar"><div class="cap-fill" style="width:${pct}%"></div></div>
      <span class="muted2">容量 ${cap.remaining}/${cap.total} 人·篇</span>
    </div>
    <div class="lib-actions">
      <button class="mini" onclick="pickUpload(${l.id}, '主图')">上传主图</button>
      ${cap.mode === 'legacy' && (cap.two > 0 || cap.four > 0) ? `
      <button class="mini" onclick="pickUpload(${l.id}, '2合1')">上传2合1(横版)</button>
      <button class="mini" onclick="pickUpload(${l.id}, '4合1')">上传4合1(竖版)</button>` : `
      <button class="mini" onclick="pickUpload(${l.id}, '横版近景')">上传横版(近景)</button>
      <button class="mini" onclick="pickUpload(${l.id}, '横版远景')">上传横版(远景)</button>
      <button class="mini" onclick="pickUpload(${l.id}, '竖版近景')">上传竖版(近景)</button>
      <button class="mini" onclick="pickUpload(${l.id}, '竖版远景')">上传竖版(远景)</button>`}
      <span class="muted2" id="up${l.id}"></span>
      <span style="flex:1"></span>
      <button class="mini danger" onclick="delLib(${l.id})">删除库</button>
    </div>
    <div class="muted2" style="margin-top:6px">${cap.mode === 'legacy' && (cap.two > 0 || cap.four > 0)
      ? '旧版三分类库:按旧逻辑发完为止;新素材建议新建库,使用近/远景五分类。'
      : '主图直出;2合1 = 横版近景 × 横版远景 随机配对上下拼;4合1 = 竖版近景 2 张 + 竖版远景 2 张随机组合田字拼(位置随机,不裁切/不翻转)。容量 = min(横近×横远, C(竖近,2)×C(竖远,2))。'}数量已与 COS 桶对齐,支持一次选多张。COS 目录:<span class="path">${esc(l.cos_prefix||'')}</span></div>
  </div>`;
}

let _uploadTarget = null;
function pickUpload(libId, role) {
  _uploadTarget = { libId, role };
  const inp = document.getElementById('fileInput');
  inp.value = '';
  inp.click();
}
function delLib(id) {
  if (!confirm('确定删除该素材库?会一并删除 COS 上该目录的所有素材文件,不可恢复。')) return;
  api('delete_library', { library_id: id }).then(r => {
    if (!r.ok || r.data.error) { App.toast(r.data.error || '删除失败'); return; }
    App.toast('已删除'); loadLibs();
  });
}

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const files = [...e.target.files].filter(f => f.type.startsWith('image/'));
  const t = _uploadTarget;
  _uploadTarget = null;
  if (!files.length || !t) return;
  const set = txt => { const el = document.getElementById('up' + t.libId); if (el) el.textContent = txt; };
  set(`准备上传 ${files.length} 张...`);
  const sr = await api('sign_uploads', { library_id: t.libId, role: t.role, files: files.map(f => f.name) });
  if (!sr.ok || sr.data.error) { App.toast(sr.data.error || '签名失败'); set(''); return; }
  const uploads = sr.data.uploads;
  const done = [];
  for (let i = 0; i < files.length; i++) {
    set(`上传中 ${i + 1}/${files.length}`);
    try {
      const resp = await fetch(uploads[i].put_url, { method: 'PUT', body: files[i] });
      if (resp.ok) done.push({ cos_key: uploads[i].cos_key, filename: files[i].name });
    } catch (err) {}
  }
  if (done.length) {
    await api('register_materials', { library_id: t.libId, role: t.role, items: done });
    App.toast(`已上传 ${done.length}/${files.length} 张${t.role}`);
  } else {
    App.toast('上传失败,请检查 COS 写权限 / 跨域(CORS)配置');
  }
  set('');
  await loadLibs();
});

document.getElementById('libRefresh').onclick = async () => {
  const btn = document.getElementById('libRefresh');
  btn.disabled = true; const t = btn.textContent; btn.textContent = '同步中...';
  await loadLibs(true);   // 手动刷新绕过 60 秒对账节流
  btn.disabled = false; btn.textContent = t;
  App.toast('已与 COS 桶同步');
};

document.getElementById('lbAdd').onclick = async () => {
  const brand = document.getElementById('lbBrand').value;
  const product = document.getElementById('lbProduct').value;
  if (!brand || !product) { App.toast('请选择品牌和产品'); return; }
  const r = await api('create_library', { brand, product });   // 不传批次,后端自动用日期时间
  if (!r.ok || r.data.error) { App.toast(r.data.error || '建库失败'); return; }
  document.getElementById('lbHint').innerHTML = `已建库。用下方「上传主图 / 上传拼图素材」把图片直传即可,数量会自动同步。COS 目录:<span class="path">${esc(r.data.cos_prefix)}</span>`;
  await loadLibs();
};

document.getElementById('tkScope').onchange = e => {
  document.getElementById('tkDepts').style.display = e.target.value === 'dept' ? 'flex' : 'none';
};

document.getElementById('tkAdd').onclick = async () => {
  const library_id = document.getElementById('tkLib').value;
  if (!library_id) { App.toast('请先建并选择素材库'); return; }
  const scope = document.getElementById('tkScope').value;
  const depts = scope === 'dept'
    ? [...document.querySelectorAll('#tkDepts input:checked')].map(x => x.value) : [];
  if (scope === 'dept' && !depts.length) { App.toast('请选至少一个部门'); return; }
  const r = await api('create_task', {
    title: document.getElementById('tkTitle').value.trim(),
    library_id, scope, depts,
    per_person: parseInt(document.getElementById('tkPer').value) || 1,
    deadline: document.getElementById('tkDeadline').value,
  });
  if (!r.ok || r.data.error) { App.toast(r.data.error || '发布失败'); return; }
  App.toast(r.data.enough ? '任务已发布' : `任务已发布,但素材不够:需 ${r.data.need} 份、仅剩 ${r.data.remaining},请补充拼图素材(新库:横/竖版近远景)`);
  document.getElementById('tkTitle').value = '';
  await loadTasks();
};

let _taskPage = 0, _taskList = [];
async function loadTasks() {
  const r = await api('list_tasks');
  _taskList = (r.data && r.data.tasks) || [];
  drawTasks();
}
function drawTasks() {
  const pg = App.paginate(_taskList, _taskPage);
  _taskPage = pg.page;
  document.getElementById('tasks').innerHTML = pg.rows.length ? pg.rows.map(taskRow).join('') : '<div class="muted2">还没有任务</div>';
  pg.rows.forEach(t => { const b = document.getElementById('close'+t.id); if (b) b.onclick = () => closeTask(t.id); });
  App.renderPager('tasksPager', pg.page, pg.pages, p => { _taskPage = p; drawTasks(); });
}

function taskRow(t) {
  const scopeTxt = t.scope === 'all' ? '全员' : ('部门:' + (t.depts||[]).join('、'));
  const open = t.status === 'open';
  return `<div class="task">
    <div class="task-head">
      <span class="lib-name">${esc(t.title || (t.brand+' '+t.product))}</span>
      <span class="pill ${open?'ok':''}">${open?'进行中':'已结束'}</span>
      <span class="muted2">${esc(scopeTxt)} · 每人 ${t.per_person} 篇${t.deadline?(' · 截止 '+esc(t.deadline)):''}</span>
      <span class="muted2">已发 ${t.issued} · 已发布 ${t.published} · 剩余容量 ${t.capacity.remaining}</span>
      ${open?`<button class="mini" id="close${t.id}">结束任务</button>`:''}
    </div>
  </div>`;
}

async function closeTask(id) {
  if (!confirm('确定结束该任务?业务将无法再领取。')) return;
  const r = await api('close_task', { id });
  if (!r.ok || r.data.error) { App.toast(r.data.error || '操作失败'); return; }
  App.toast('已结束'); await loadTasks();
}
</script>
</body>
</html>
