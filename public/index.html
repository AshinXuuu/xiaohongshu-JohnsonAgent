<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小红书文案生成助手</title>
<style>
  :root {
    --primary: #ff2741;
    --primary-light: #ffe7ea;
    --bg: #faf9f7;
    --card: #ffffff;
    --text: #222;
    --muted: #6b6b6b;
    --border: #ececec;
    --shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 28px;
    margin: 0 0 6px;
    letter-spacing: 0.5px;
  }
  header h1 span { color: var(--primary); }
  header p {
    color: var(--muted);
    font-size: 14px;
    margin: 0;
  }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  select, textarea, input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    transition: border-color 0.15s;
  }
  select:focus, textarea:focus, input:focus {
    outline: none;
    border-color: var(--primary);
  }
  textarea { resize: vertical; min-height: 60px; }
  .types {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .type-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .type-btn:hover { border-color: var(--primary); }
  .type-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }
  .submit-btn:hover { opacity: 0.92; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
  .result-section {
    display: none;
  }
  .result-section.visible { display: block; }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    margin: 18px 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title:first-child { margin-top: 0; }
  .copy-btn {
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
  }
  .copy-btn:hover { background: #ffd1d6; }
  .title-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .title-list li {
    padding: 10px 12px;
    background: #fafafa;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
    border: 1px solid transparent;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .title-list li:hover {
    background: var(--primary-light);
    border-color: var(--primary);
  }
  .title-list .num {
    color: var(--primary);
    font-weight: 600;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .title-list .text { flex: 1; }
  .title-list .mini-copy {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .body-box {
    background: #fafafa;
    border-radius: 8px;
    padding: 14px 16px;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.8;
  }
  .tags-box {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    background: var(--primary-light);
    color: var(--primary);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
  }
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .loading .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--primary-light);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    background: #fff3f3;
    color: #c0392b;
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    border: 1px solid #ffd6d6;
  }
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .footer-hint {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 30px;
  }
  /* 左右按钮 */
  .result-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 24px;
  }
  .submit-btn.ghost {
    background: #fff;
    color: var(--primary);
    border: 1px solid var(--primary);
  }
  /* 封面生成面板 */
  .cover-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) { .cover-grid-3 { grid-template-columns: 1fr; } }
  .cover-input {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .cover-input small { color: var(--muted); font-size: 11px; }
  .ai-import-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
  }
  .ai-import-btn:hover { opacity: 0.92; }
  .ai-import-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  /* 上传区 */
  .upload-zone {
    border: 2px dashed #ccc;
    border-radius: 10px;
    padding: 26px;
    text-align: center;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.15s;
    background: #fafafa;
  }
  .upload-zone:hover, .upload-zone.dragging {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .upload-zone input[type="file"] { display: none; }
  .upload-zone .hint { color: var(--muted); font-size: 13px; margin: 4px 0 0; }
  .upload-zone .icon { font-size: 32px; margin-bottom: 4px; opacity: 0.6; }
  .photo-preview {
    position: relative;
    margin-bottom: 14px;
    border-radius: 10px;
    overflow: hidden;
    background: #f0f0f0;
  }
  .photo-preview img {
    width: 100%;
    max-height: 320px;
    object-fit: contain;
    display: block;
  }
  .photo-preview .remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    color: white;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
  }
  .photo-info {
    padding: 6px 12px;
    font-size: 12px;
    color: var(--muted);
    background: white;
    text-align: center;
  }
  .gen-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #ff6b6b, #ff2741);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .gen-btn:disabled { background: #ccc; cursor: not-allowed; }
  .cover-status {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }
  .cover-status.show { display: block; }
  .cover-status.loading { background: #f0f9ff; color: #0369a1; border-left: 3px solid #0369a1; }
  .cover-status.success { background: #f0fdf4; color: #166534; border-left: 3px solid #16a34a; }
  .cover-status.error { background: #fef2f2; color: #991b1b; border-left: 3px solid #dc2626; }
  /* 结果图 */
  .cover-results {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 600px) { .cover-results { grid-template-columns: 1fr 1fr; } }
  .cover-result-card {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: white;
    position: relative;
  }
  .cover-result-card img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    cursor: zoom-in;
  }
  .cover-result-card .actions {
    display: flex;
    border-top: 1px solid var(--border);
  }
  .cover-result-card .actions a {
    flex: 1;
    padding: 8px;
    text-align: center;
    text-decoration: none;
    color: var(--primary);
    font-size: 13px;
    font-weight: 500;
    background: white;
  }
  .cover-result-card .actions a:hover { background: var(--primary-light); }
  /* 大图 lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
  .lightbox .close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    color: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
  }
  /* 风格选择卡片 */
  .style-picker {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) { .style-picker { grid-template-columns: 1fr; } }
  .style-card {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 12px 14px;
    border: 2px solid #e5e5e5;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    background: #fafafa;
  }
  .style-card:hover { border-color: var(--primary); background: #fff; }
  .style-card.active {
    border-color: var(--primary);
    background: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(255, 39, 65, 0.1);
  }
  .style-card .style-icon { font-size: 22px; }
  .style-card .style-name { font-weight: 600; font-size: 14px; }
  .style-card .style-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
  /* 旧 Canva 样式保留为引用 */
  .canva-title-pick {
    display: grid;
    gap: 8px;
    margin-bottom: 18px;
  }
  .canva-title-pick label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #fafafa;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    font-size: 14px;
  }
  .canva-title-pick label:hover { background: #f5f5f5; }
  .canva-title-pick label:has(input:checked) {
    background: var(--primary-light);
    border-color: var(--primary);
  }
  .canva-title-pick input[type="radio"]:checked + span {
    font-weight: 600;
    color: var(--primary);
  }
  .template-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .template-tile {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    padding: 16px 18px;
    background: linear-gradient(135deg, #fdfdff 0%, #f5f3ff 100%);
    border: 1px solid #ddd;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    color: var(--text);
  }
  .template-tile:hover {
    border-color: var(--primary);
    box-shadow: 0 4px 14px rgba(255, 39, 65, 0.12);
    transform: translateY(-1px);
  }
  .template-tile .name { font-size: 15px; font-weight: 600; }
  .template-tile .desc { font-size: 12px; color: var(--muted); }
  .template-tile .category {
    display: inline-block;
    padding: 2px 8px;
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 10px;
    font-size: 11px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>小红书<span>文案生成</span>助手</h1>
    <p>选产品 · 选类型 · 一键生成 · 复制即用</p>
  </header>

  <div class="card">
    <div class="form-row">
      <div>
        <label for="brand">品牌</label>
        <select id="brand"><option value="">加载中...</option></select>
      </div>
      <div>
        <label for="product">产品</label>
        <select id="product" disabled><option value="">请先选择品牌</option></select>
      </div>
    </div>

    <label>文案类型</label>
    <div class="types" id="types">
      <button class="type-btn active" data-type="种草">种草测评</button>
      <button class="type-btn" data-type="场景">场景化</button>
      <button class="type-btn" data-type="生活">生活方式</button>
      <button class="type-btn" data-type="促销">促销活动</button>
      <button class="type-btn" data-type="干货">干货教程</button>
      <button class="type-btn" data-type="封面金句">封面金句</button>
    </div>

    <div style="margin-top:14px;">
      <label for="extra">补充信息(可选)</label>
      <textarea id="extra" placeholder="例如:主打春季减脂场景 / 双 11 满减活动 / 目标 30+ 职场女性 ..."></textarea>
    </div>

    <button class="submit-btn" id="submit">一键生成文案</button>
  </div>

  <div class="card result-section" id="result">
    <!-- 结果区动态填充 -->
  </div>

  <div class="card result-section" id="coverSection">
    <!-- AI 封面生成模块动态填充 -->
  </div>

  <div class="card result-section" id="coverResultSection">
    <!-- AI 封面生成结果(3 张图) -->
  </div>

  <p class="footer-hint">生成结果仅供参考,发布前请人工把关一遍内容真实性 · 文案: DeepSeek · 封面: 豆包 SeedEdit</p>

</div>

<div class="toast" id="toast">已复制</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="" />
</div>

<script>
const $ = (id) => document.getElementById(id);
const brandSel = $('brand');
const productSel = $('product');
const submitBtn = $('submit');
const resultEl = $('result');
const toast = $('toast');

let products = { brands: [] };
let activeType = '种草';

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1400);
}

function copy(text) {
  navigator.clipboard.writeText(text).then(() => showToast('已复制'));
}

// 加载产品列表
async function loadProducts() {
  try {
    const resp = await fetch('/api/products');
    products = await resp.json();
    if (!products.brands || !products.brands.length) {
      brandSel.innerHTML = '<option value="">(产品库为空)</option>';
      return;
    }
    brandSel.innerHTML = '<option value="">请选择品牌</option>' +
      products.brands.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
  } catch (e) {
    brandSel.innerHTML = '<option value="">加载失败</option>';
  }
}

brandSel.addEventListener('change', () => {
  const brand = products.brands.find(b => b.name === brandSel.value);
  if (!brand) {
    productSel.disabled = true;
    productSel.innerHTML = '<option value="">请先选择品牌</option>';
    return;
  }
  productSel.disabled = false;
  productSel.innerHTML = '<option value="">请选择产品</option>' +
    brand.products.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
});

// 文案类型切换
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
  });
});

submitBtn.addEventListener('click', generate);

async function generate() {
  if (!brandSel.value) return showToast('请先选择品牌');
  if (!productSel.value) return showToast('请先选择产品');

  submitBtn.disabled = true;
  submitBtn.textContent = '生成中...';
  resultEl.classList.add('visible');
  resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>AI 正在创作中,通常需要 10-30 秒...</div>';

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        brand: brandSel.value,
        product: productSel.value,
        copy_type: activeType,
        extra: $('extra').value.trim()
      })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      resultEl.innerHTML = `<div class="error">⚠️ 生成失败:${data.error || '未知错误'}</div>`;
      return;
    }
    lastGenContext = {
      brand: brandSel.value,
      product: productSel.value,
      copy_type: activeType,
      extra: $('extra').value.trim(),
      titles: data.titles || [],
      body: data.body || '',
      tags: data.tags || [],
    };
    renderResult(data);
  } catch (e) {
    resultEl.innerHTML = `<div class="error">⚠️ 网络错误:${e.message}</div>`;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '一键生成文案';
  }
}

function renderResult(data) {
  const titles = data.titles || [];
  const body = data.body || '';
  const tags = data.tags || [];
  const tagsText = tags.join(' ');
  const fullText = (titles[0] || '') + '\n\n' + body + '\n\n' + tagsText;

  resultEl.innerHTML = `
    <div class="section-title">
      📌 标题(5 选 1,点击复制)
      <button class="copy-btn" onclick='copyAll()'>复制全文</button>
    </div>
    <ul class="title-list">
      ${titles.map((t, i) => `
        <li onclick='copy(${JSON.stringify(t)})'>
          <span><span class="num">${i+1}.</span><span class="text">${escapeHtml(t)}</span></span>
          <span class="mini-copy">点击复制</span>
        </li>
      `).join('')}
    </ul>

    <div class="section-title">
      📝 正文
      <button class="copy-btn" onclick='copy(${JSON.stringify(body)})'>复制正文</button>
    </div>
    <div class="body-box">${escapeHtml(body)}</div>

    <div class="section-title">
      🏷️ 话题标签
      <button class="copy-btn" onclick='copy(${JSON.stringify(tagsText)})'>复制标签</button>
    </div>
    <div class="tags-box">
      ${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
    </div>

    <div class="result-actions">
      <button class="submit-btn ghost" onclick='document.getElementById("submit").click()'>
        🔄 重新生成一版
      </button>
      <button class="submit-btn" onclick='openCoverPanel()'>
        🎨 生成封面图
      </button>
    </div>
  `;
  // 把工具函数暴露到全局供 onclick 用
  window.copy = copy;
  window.copyAll = () => copy(fullText);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

window.copy = copy;
loadProducts();

// ─── AI 封面生成(豆包 SeedEdit)───
const coverSectionEl = $('coverSection');
const coverResultEl = $('coverResultSection');
let lastGenContext = null;     // 上一次生成的文案上下文,给"一键导入"用
let coverPhotoBase64 = '';
let coverPhotoName = '';
let coverStyle = '种草氛围';   // 当前选中的封面风格

const COVER_STYLES = [
  { id: '种草氛围', icon: '🌸', desc: '柔和高级、像真实分享,适合种草/生活类' },
  { id: '干货教程', icon: '📚', desc: '白底黑字+黄高亮,信息密度高,适合干货/避雷' },
  { id: '促销爆款', icon: '🔥', desc: '红黄高饱和+紧迫感,适合大促/上新' },
  { id: '运动潮感', icon: '💪', desc: '高对比+动感,适合健身器材专属调性' },
];

function openCoverPanel() {
  coverPhotoBase64 = '';
  coverPhotoName = '';
  coverResultEl.classList.remove('visible');

  coverSectionEl.classList.add('visible');
  coverSectionEl.innerHTML = `
    <div class="section-title">
      🎨 生成封面图
      <button class="ai-import-btn" onclick="aiImportFields()">✨ 一键导入</button>
    </div>
    <p style="color: var(--muted); font-size: 13px; margin: 0 0 14px;">
      上传一张你拍好的产品照,填 3 个文字字段,豆包 AI 会一次生成 3 张候选封面(3:4 比例,无水印)。
      点"一键导入"会基于刚才生成的文案,自动填好 3 个字段。
    </p>

    <div class="cover-grid-3">
      <div class="cover-input">
        <label style="font-size:13px;color:var(--muted);">主标题 <small>(8-14 字)</small></label>
        <input type="text" id="mainTitle" placeholder="如:客厅多了它" maxlength="20" />
      </div>
      <div class="cover-input">
        <label style="font-size:13px;color:var(--muted);">副标题 <small>(4-10 字)</small></label>
        <input type="text" id="subtitle" placeholder="如:30+ 真香" maxlength="14" />
      </div>
      <div class="cover-input">
        <label style="font-size:13px;color:var(--muted);">花字 <small>(6-20 字,可多行)</small></label>
        <input type="text" id="huaText" placeholder="如:亲测好用 三个月不踩坑" maxlength="22" />
      </div>
    </div>

    <label style="font-size:13px;color:var(--muted);">上传产品照(JPG / PNG,3MB 内,3:4 比例最佳)</label>
    <div id="coverUploadArea">
      <div class="upload-zone" id="uploadZone">
        <div class="icon">📷</div>
        <div><strong>点击或拖拽图片到这里</strong></div>
        <p class="hint">建议 3:4 比例(如 900x1200 / 1080x1440)</p>
        <input type="file" id="photoInput" accept="image/jpeg,image/png" />
      </div>
    </div>

    <label style="font-size:13px;color:var(--muted);">选择封面风格(决定 AI 出图的视觉调性)</label>
    <div class="style-picker" id="stylePicker">
      ${COVER_STYLES.map(s => `
        <div class="style-card${s.id === coverStyle ? ' active' : ''}" data-style="${escapeHtml(s.id)}">
          <span class="style-icon">${s.icon}</span>
          <span class="style-name">${escapeHtml(s.id)}</span>
          <span class="style-desc">${escapeHtml(s.desc)}</span>
        </div>
      `).join('')}
    </div>

    <button class="gen-btn" id="coverGenBtn" disabled>请上传照片 + 填主标题</button>
    <div class="cover-status" id="coverStatus"></div>
  `;
  $('coverGenBtn').addEventListener('click', generateCovers);
  ['mainTitle', 'subtitle', 'huaText'].forEach(id => {
    $(id).addEventListener('input', updateGenBtnState);
  });
  setupPhotoUpload();
  setupStylePicker();
  updateGenBtnState();
  // 滚到这块
  coverSectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
window.openCoverPanel = openCoverPanel;

function setupStylePicker() {
  document.querySelectorAll('.style-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      coverStyle = card.dataset.style;
    });
  });
}

async function aiImportFields() {
  if (!lastGenContext) return showToast('请先生成一次文案');
  const btn = document.querySelector('.ai-import-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  try {
    const resp = await fetch('/api/cover-fields', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        brand: lastGenContext.brand,
        product: lastGenContext.product,
        copy_type: lastGenContext.copy_type,
        extra: lastGenContext.extra,
        // 把已生成的文案上下文也带上,让 DeepSeek 有更多素材
        titles: lastGenContext.titles,
        body: lastGenContext.body,
        tags: lastGenContext.tags,
      })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      showToast('导入失败:' + (data.error || '未知'));
      return;
    }
    $('mainTitle').value = data.main_title || '';
    $('subtitle').value = data.subtitle || '';
    $('huaText').value = data.hua_text || '';
    updateGenBtnState();
    showToast('✓ 已自动填充');
  } catch (e) {
    showToast('网络错误:' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ 一键导入';
  }
}
window.aiImportFields = aiImportFields;

function setupPhotoUpload() {
  const zone = $('uploadZone');
  const input = $('photoInput');
  if (!zone || !input) return;
  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragging'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragging'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragging');
    if (e.dataTransfer.files.length) handlePhotoFile(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', e => {
    if (e.target.files.length) handlePhotoFile(e.target.files[0]);
  });
}

function handlePhotoFile(file) {
  if (!file.type.startsWith('image/')) return showToast('只能上传图片');
  if (file.size > 3 * 1024 * 1024) return showToast('图片过大,请压缩到 3MB 以内');
  const reader = new FileReader();
  reader.onload = e => {
    coverPhotoBase64 = e.target.result;
    coverPhotoName = file.name;
    renderPhotoPreview(file);
    updateGenBtnState();
  };
  reader.readAsDataURL(file);
}

function renderPhotoPreview(file) {
  const area = $('coverUploadArea');
  const sizeKB = (file.size / 1024).toFixed(0);
  area.innerHTML = `
    <div class="photo-preview">
      <img src="${coverPhotoBase64}" alt="预览" />
      <button class="remove" onclick="removeCoverPhoto()">×</button>
      <div class="photo-info">${escapeHtml(file.name)} · ${sizeKB} KB</div>
    </div>
  `;
}

function removeCoverPhoto() {
  coverPhotoBase64 = '';
  coverPhotoName = '';
  const area = $('coverUploadArea');
  area.innerHTML = `
    <div class="upload-zone" id="uploadZone">
      <div class="icon">📷</div>
      <div><strong>点击或拖拽图片到这里</strong></div>
      <p class="hint">建议 3:4 比例(如 900x1200 / 1080x1440)</p>
      <input type="file" id="photoInput" accept="image/jpeg,image/png" />
    </div>
  `;
  setupPhotoUpload();
  updateGenBtnState();
}
window.removeCoverPhoto = removeCoverPhoto;

function updateGenBtnState() {
  const btn = $('coverGenBtn');
  if (!btn) return;
  const main = ($('mainTitle')?.value || '').trim();
  if (coverPhotoBase64 && main) {
    btn.disabled = false;
    btn.textContent = '✨ 生成 3 张候选封面';
  } else {
    btn.disabled = true;
    if (!coverPhotoBase64) btn.textContent = '请先上传产品照';
    else btn.textContent = '请填写主标题';
  }
}

async function generateCovers() {
  const main = $('mainTitle').value.trim();
  const sub = $('subtitle').value.trim();
  const hua = $('huaText').value.trim();
  if (!coverPhotoBase64) return showToast('请先上传产品照');
  if (!main) return showToast('请填主标题');

  const btn = $('coverGenBtn');
  const status = $('coverStatus');
  btn.disabled = true;
  btn.textContent = '生成中...';
  status.className = 'cover-status loading show';
  status.textContent = '豆包正在并行生成 3 张候选封面,约 20-50 秒,请耐心等待...';
  coverResultEl.classList.remove('visible');

  try {
    const resp = await fetch('/api/cover-generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        photo_base64: coverPhotoBase64,
        main_title: main,
        subtitle: sub,
        hua_text: hua,
        style: coverStyle,
      })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      status.className = 'cover-status error show';
      status.innerHTML = '失败:' + escapeHtml(data.error || '未知错误') +
        (data.details ? '<br><small>' + escapeHtml(JSON.stringify(data.details)) + '</small>' : '');
      btn.disabled = false;
      btn.textContent = '🔁 重试';
      return;
    }

    const images = data.images || [];
    const errs = data.errors || [];

    let statusMsg = `✅ 成功生成 ${images.length} 张`;
    if (errs.length) statusMsg += `,${errs.length} 张失败(已忽略)`;
    status.className = 'cover-status success show';
    status.textContent = statusMsg;

    renderCoverResults(images);
    btn.disabled = false;
    btn.textContent = '🔁 再生成 3 张';
  } catch (e) {
    status.className = 'cover-status error show';
    status.textContent = '网络错误: ' + e.message;
    btn.disabled = false;
    btn.textContent = '🔁 重试';
  }
}

function renderCoverResults(images) {
  if (!images.length) return;
  coverResultEl.classList.add('visible');
  coverResultEl.innerHTML = `
    <div class="section-title">🖼️ 生成结果(点缩略图看大图,点"下载"保存)</div>
    <div class="cover-results">
      ${images.map((url, i) => `
        <div class="cover-result-card">
          <img src="${escapeHtml(url)}" alt="封面候选 ${i+1}" onclick="openLightbox('${escapeHtml(url)}')" />
          <div class="actions">
            <a href="${escapeHtml(url)}" download="cover_${i+1}.png" target="_blank">⬇ 下载</a>
            <a href="${escapeHtml(url)}" target="_blank">🔍 大图</a>
          </div>
        </div>
      `).join('')}
    </div>
    <p style="color:var(--muted);font-size:12px;margin:14px 0 0;">
      💡 AI 生图对中文文字识别仍不完美,可能出现错字。如果 3 张都不理想,点上方"再生成 3 张"重试,
      或者用<b>程序化兜底</b>(下一版本会加)。
    </p>
  `;
  coverResultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openLightbox(url) {
  const lb = $('lightbox');
  $('lightboxImg').src = url;
  lb.classList.add('show');
}
window.openLightbox = openLightbox;
function closeLightbox() { $('lightbox').classList.remove('show'); }
window.closeLightbox = closeLightbox;
</script>
</body>
</html>
