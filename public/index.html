<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小红书文案生成助手</title>
<style>
  :root {
    --primary: #ff2741;
    --primary-light: #ffe7ea;
    --bg: #faf9f7;
    --card: #ffffff;
    --text: #222;
    --muted: #6b6b6b;
    --border: #ececec;
    --shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 28px;
    margin: 0 0 6px;
    letter-spacing: 0.5px;
  }
  header h1 span { color: var(--primary); }
  header p {
    color: var(--muted);
    font-size: 14px;
    margin: 0;
  }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  select, textarea, input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    transition: border-color 0.15s;
  }
  select:focus, textarea:focus, input:focus {
    outline: none;
    border-color: var(--primary);
  }
  textarea { resize: vertical; min-height: 60px; }
  .types {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .type-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .type-btn:hover { border-color: var(--primary); }
  .type-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }
  .submit-btn:hover { opacity: 0.92; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
  .result-section {
    display: none;
  }
  .result-section.visible { display: block; }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    margin: 18px 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title:first-child { margin-top: 0; }
  .copy-btn {
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
  }
  .copy-btn:hover { background: #ffd1d6; }
  .title-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .title-list li {
    padding: 10px 12px;
    background: #fafafa;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
    border: 1px solid transparent;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .title-list li:hover {
    background: var(--primary-light);
    border-color: var(--primary);
  }
  .title-list .num {
    color: var(--primary);
    font-weight: 600;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .title-list .text { flex: 1; }
  .title-list .mini-copy {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .body-box {
    background: #fafafa;
    border-radius: 8px;
    padding: 14px 16px;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.8;
  }
  .tags-box {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    background: var(--primary-light);
    color: var(--primary);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
  }
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .loading .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--primary-light);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    background: #fff3f3;
    color: #c0392b;
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    border: 1px solid #ffd6d6;
  }
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .footer-hint {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 30px;
  }
  /* Canva 模块样式 */
  .canva-title-pick {
    display: grid;
    gap: 8px;
    margin-bottom: 18px;
  }
  .canva-title-pick label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #fafafa;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    font-size: 14px;
  }
  .canva-title-pick label:hover { background: #f5f5f5; }
  .canva-title-pick label:has(input:checked) {
    background: var(--primary-light);
    border-color: var(--primary);
  }
  .canva-title-pick input[type="radio"]:checked + span {
    font-weight: 600;
    color: var(--primary);
  }
  .template-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .template-tile {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    padding: 16px 18px;
    background: linear-gradient(135deg, #fdfdff 0%, #f5f3ff 100%);
    border: 1px solid #ddd;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    color: var(--text);
  }
  .template-tile:hover {
    border-color: var(--primary);
    box-shadow: 0 4px 14px rgba(255, 39, 65, 0.12);
    transform: translateY(-1px);
  }
  .template-tile .name { font-size: 15px; font-weight: 600; }
  .template-tile .desc { font-size: 12px; color: var(--muted); }
  .template-tile .category {
    display: inline-block;
    padding: 2px 8px;
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 10px;
    font-size: 11px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>小红书<span>文案生成</span>助手</h1>
    <p>选产品 · 选类型 · 一键生成 · 复制即用</p>
  </header>

  <div class="card">
    <div class="form-row">
      <div>
        <label for="brand">品牌</label>
        <select id="brand"><option value="">加载中...</option></select>
      </div>
      <div>
        <label for="product">产品</label>
        <select id="product" disabled><option value="">请先选择品牌</option></select>
      </div>
    </div>

    <label>文案类型</label>
    <div class="types" id="types">
      <button class="type-btn active" data-type="种草">种草测评</button>
      <button class="type-btn" data-type="场景">场景化</button>
      <button class="type-btn" data-type="生活">生活方式</button>
      <button class="type-btn" data-type="促销">促销活动</button>
      <button class="type-btn" data-type="干货">干货教程</button>
      <button class="type-btn" data-type="封面金句">封面金句</button>
    </div>

    <div style="margin-top:14px;">
      <label for="extra">补充信息(可选)</label>
      <textarea id="extra" placeholder="例如:主打春季减脂场景 / 双 11 满减活动 / 目标 30+ 职场女性 ..."></textarea>
    </div>

    <button class="submit-btn" id="submit">一键生成文案</button>
  </div>

  <div class="card result-section" id="result">
    <!-- 结果区动态填充 -->
  </div>

  <div class="card result-section" id="canvaSection">
    <!-- Canva 模块动态填充 -->
  </div>

  <p class="footer-hint">生成结果仅供参考,发布前请人工把关一遍内容真实性 · 模型: DeepSeek · 封面: Canva</p>

</div>

<div class="toast" id="toast">已复制</div>

<script>
const $ = (id) => document.getElementById(id);
const brandSel = $('brand');
const productSel = $('product');
const submitBtn = $('submit');
const resultEl = $('result');
const toast = $('toast');

let products = { brands: [] };
let activeType = '种草';

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1400);
}

function copy(text) {
  navigator.clipboard.writeText(text).then(() => showToast('已复制'));
}

// 加载产品列表
async function loadProducts() {
  try {
    const resp = await fetch('/api/products');
    products = await resp.json();
    if (!products.brands || !products.brands.length) {
      brandSel.innerHTML = '<option value="">(产品库为空)</option>';
      return;
    }
    brandSel.innerHTML = '<option value="">请选择品牌</option>' +
      products.brands.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
  } catch (e) {
    brandSel.innerHTML = '<option value="">加载失败</option>';
  }
}

brandSel.addEventListener('change', () => {
  const brand = products.brands.find(b => b.name === brandSel.value);
  if (!brand) {
    productSel.disabled = true;
    productSel.innerHTML = '<option value="">请先选择品牌</option>';
    return;
  }
  productSel.disabled = false;
  productSel.innerHTML = '<option value="">请选择产品</option>' +
    brand.products.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
});

// 文案类型切换
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
  });
});

submitBtn.addEventListener('click', generate);

async function generate() {
  if (!brandSel.value) return showToast('请先选择品牌');
  if (!productSel.value) return showToast('请先选择产品');

  submitBtn.disabled = true;
  submitBtn.textContent = '生成中...';
  resultEl.classList.add('visible');
  resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>AI 正在创作中,通常需要 10-30 秒...</div>';

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        brand: brandSel.value,
        product: productSel.value,
        copy_type: activeType,
        extra: $('extra').value.trim()
      })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      resultEl.innerHTML = `<div class="error">⚠️ 生成失败:${data.error || '未知错误'}</div>`;
      return;
    }
    renderResult(data);
    renderCanvaSection(data);
  } catch (e) {
    resultEl.innerHTML = `<div class="error">⚠️ 网络错误:${e.message}</div>`;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '一键生成文案';
  }
}

function renderResult(data) {
  const titles = data.titles || [];
  const body = data.body || '';
  const tags = data.tags || [];
  const tagsText = tags.join(' ');
  const fullText = (titles[0] || '') + '\n\n' + body + '\n\n' + tagsText;

  resultEl.innerHTML = `
    <div class="section-title">
      📌 标题(5 选 1,点击复制)
      <button class="copy-btn" onclick='copyAll()'>复制全文</button>
    </div>
    <ul class="title-list">
      ${titles.map((t, i) => `
        <li onclick='copy(${JSON.stringify(t)})'>
          <span><span class="num">${i+1}.</span><span class="text">${escapeHtml(t)}</span></span>
          <span class="mini-copy">点击复制</span>
        </li>
      `).join('')}
    </ul>

    <div class="section-title">
      📝 正文
      <button class="copy-btn" onclick='copy(${JSON.stringify(body)})'>复制正文</button>
    </div>
    <div class="body-box">${escapeHtml(body)}</div>

    <div class="section-title">
      🏷️ 话题标签
      <button class="copy-btn" onclick='copy(${JSON.stringify(tagsText)})'>复制标签</button>
    </div>
    <div class="tags-box">
      ${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
    </div>

    <button class="submit-btn" style="margin-top:24px;background:#fff;color:var(--primary);border:1px solid var(--primary);" onclick='document.getElementById("submit").click()'>
      🔄 重新生成一版
    </button>
  `;
  // 把工具函数暴露到全局供 onclick 用
  window.copy = copy;
  window.copyAll = () => copy(fullText);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

window.copy = copy;
loadProducts();

// ─── Canva 简化集成(复制金句 + 跳转模板)───
const canvaSectionEl = $('canvaSection');
let canvaTemplates = null;
let canvaSelectedTitle = '';

async function loadCanvaTemplates() {
  if (canvaTemplates !== null) return canvaTemplates;
  try {
    const resp = await fetch('/canva_templates.json');
    const data = await resp.json();
    canvaTemplates = (data.templates || []).filter(t => t.url);
  } catch (e) {
    canvaTemplates = [];
  }
  return canvaTemplates;
}

async function renderCanvaSection(data) {
  const titles = data.titles || [];
  canvaSelectedTitle = titles[0] || '';

  canvaSectionEl.classList.add('visible');
  canvaSectionEl.innerHTML = `
    <div class="section-title">🎨 去 Canva 做封面</div>
    <p style="color: var(--muted); font-size: 13px; margin: 0 0 16px;">
      选一个金句 + 点一个模板,系统自动把金句复制到剪贴板 + 在新标签页打开 Canva 模板。
      到了 Canva 里 <b>Ctrl/Cmd + V</b> 粘贴金句、拖入你拍的产品图,几分钟搞定。
    </p>

    <label style="font-size:13px;color:var(--muted);">1. 选金句(系统会复制这一条到剪贴板)</label>
    <div class="canva-title-pick" id="canvaTitlePick">
      ${titles.map((t, i) => `
        <label>
          <input type="radio" name="canvaTitle" value="${escapeHtml(t)}" ${i === 0 ? 'checked' : ''} />
          <span>${escapeHtml(t)}</span>
        </label>
      `).join('')}
    </div>

    <label style="font-size:13px;color:var(--muted);">2. 选模板,点了直接跳转</label>
    <div id="canvaTemplateArea">
      <div class="loading" style="padding:20px"><div class="spinner"></div>加载模板中...</div>
    </div>
  `;

  document.querySelectorAll('input[name="canvaTitle"]').forEach(r => {
    r.addEventListener('change', e => canvaSelectedTitle = e.target.value);
  });

  // 加载模板列表
  const templates = await loadCanvaTemplates();
  const area = $('canvaTemplateArea');
  if (!templates.length) {
    area.innerHTML = `<div class="error" style="font-size:13px">
      还没有配置 Canva 模板。请管理员编辑 <code>public/canva_templates.json</code>,把你们在 Canva 设计好的模板分享链接填进去。
    </div>`;
    return;
  }
  area.innerHTML = `
    <div class="template-grid">
      ${templates.map(t => `
        <a class="template-tile" data-url="${escapeHtml(t.url)}">
          <span class="category">${escapeHtml(t.category || '通用')}</span>
          <span class="name">${escapeHtml(t.name || t.id)}</span>
          ${t.desc ? `<span class="desc">${escapeHtml(t.desc)}</span>` : ''}
        </a>
      `).join('')}
    </div>
  `;
  document.querySelectorAll('.template-tile').forEach(tile => {
    tile.addEventListener('click', () => goToCanvaTemplate(tile.dataset.url));
  });
}

async function goToCanvaTemplate(url) {
  if (!canvaSelectedTitle) return showToast('请先选一个金句');
  try {
    await navigator.clipboard.writeText(canvaSelectedTitle);
    showToast('✓ 金句已复制,Canva 里 Ctrl/Cmd+V 粘贴');
  } catch (_) {
    // 剪贴板写入失败也不阻塞跳转
  }
  window.open(url, '_blank');
}
</script>
</body>
</html>
