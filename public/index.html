<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小红书文案生成助手</title>
<style>
  :root {
    --primary: #ff2741;
    --primary-light: #ffe7ea;
    --bg: #faf9f7;
    --card: #ffffff;
    --text: #222;
    --muted: #6b6b6b;
    --border: #ececec;
    --shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 28px;
    margin: 0 0 6px;
    letter-spacing: 0.5px;
  }
  header h1 span { color: var(--primary); }
  header p {
    color: var(--muted);
    font-size: 14px;
    margin: 0;
  }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  select, textarea, input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    transition: border-color 0.15s;
  }
  select:focus, textarea:focus, input:focus {
    outline: none;
    border-color: var(--primary);
  }
  textarea { resize: vertical; min-height: 60px; }
  .types {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .type-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .type-btn:hover { border-color: var(--primary); }
  .type-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }
  .submit-btn:hover { opacity: 0.92; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
  .result-section {
    display: none;
  }
  .result-section.visible { display: block; }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    margin: 18px 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title:first-child { margin-top: 0; }
  .copy-btn {
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
  }
  .copy-btn:hover { background: #ffd1d6; }
  .title-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .title-list li {
    padding: 10px 12px;
    background: #fafafa;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
    border: 1px solid transparent;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .title-list li:hover {
    background: var(--primary-light);
    border-color: var(--primary);
  }
  .title-list .num {
    color: var(--primary);
    font-weight: 600;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .title-list .text { flex: 1; }
  .title-list .mini-copy {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .body-box {
    background: #fafafa;
    border-radius: 8px;
    padding: 14px 16px;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.8;
  }
  .tags-box {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    background: var(--primary-light);
    color: var(--primary);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
  }
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .loading .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--primary-light);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    background: #fff3f3;
    color: #c0392b;
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    border: 1px solid #ffd6d6;
  }
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .footer-hint {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 30px;
  }
  /* Canva 模块样式 */
  .canva-title-pick {
    display: grid;
    gap: 8px;
    margin-bottom: 14px;
  }
  .canva-title-pick label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #fafafa;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    font-size: 14px;
  }
  .canva-title-pick label:hover { background: #f0f0f0; }
  .canva-title-pick input[type="radio"]:checked + span {
    font-weight: 600;
    color: var(--primary);
  }
  .template-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) { .template-grid { grid-template-columns: repeat(2, 1fr); } }
  .template-card {
    cursor: pointer;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #e5e5e5;
    transition: all 0.15s;
    background: #fafafa;
    position: relative;
  }
  .template-card:hover { border-color: var(--primary); }
  .template-card.active { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  .template-card img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
  }
  .template-card .name {
    padding: 6px 8px;
    font-size: 12px;
    color: #555;
    text-align: center;
    background: white;
  }
  .canva-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #00C4CC, #7D2AE8);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .canva-btn:disabled { background: #ccc; cursor: not-allowed; }
  .canva-status {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }
  .canva-status.show { display: block; }
  .canva-status.loading { background: #f0f9ff; color: #0369a1; border-left: 3px solid #0369a1; }
  .canva-status.success { background: #f0fdf4; color: #166534; border-left: 3px solid #16a34a; }
  .canva-status.error { background: #fef2f2; color: #991b1b; border-left: 3px solid #dc2626; }
  /* 上传区 */
  .upload-zone {
    border: 2px dashed #ccc;
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.15s;
    background: #fafafa;
  }
  .upload-zone:hover, .upload-zone.dragging {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .upload-zone input[type="file"] { display: none; }
  .upload-zone .hint { color: var(--muted); font-size: 13px; margin: 0; }
  .upload-zone .icon { font-size: 36px; margin-bottom: 6px; opacity: 0.6; }
  .photo-preview {
    position: relative;
    margin-bottom: 14px;
    border-radius: 10px;
    overflow: hidden;
    background: #f0f0f0;
  }
  .photo-preview img {
    width: 100%;
    max-height: 360px;
    object-fit: contain;
    display: block;
  }
  .photo-preview .remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    color: white;
    border: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
  }
  .photo-info {
    padding: 8px 12px;
    font-size: 12px;
    color: var(--muted);
    background: white;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>小红书<span>文案生成</span>助手</h1>
    <p>选产品 · 选类型 · 一键生成 · 复制即用</p>
  </header>

  <div class="card">
    <div class="form-row">
      <div>
        <label for="brand">品牌</label>
        <select id="brand"><option value="">加载中...</option></select>
      </div>
      <div>
        <label for="product">产品</label>
        <select id="product" disabled><option value="">请先选择品牌</option></select>
      </div>
    </div>

    <label>文案类型</label>
    <div class="types" id="types">
      <button class="type-btn active" data-type="种草">种草测评</button>
      <button class="type-btn" data-type="场景">场景化</button>
      <button class="type-btn" data-type="生活">生活方式</button>
      <button class="type-btn" data-type="促销">促销活动</button>
      <button class="type-btn" data-type="干货">干货教程</button>
      <button class="type-btn" data-type="封面金句">封面金句</button>
    </div>

    <div style="margin-top:14px;">
      <label for="extra">补充信息(可选)</label>
      <textarea id="extra" placeholder="例如:主打春季减脂场景 / 双 11 满减活动 / 目标 30+ 职场女性 ..."></textarea>
    </div>

    <button class="submit-btn" id="submit">一键生成文案</button>
  </div>

  <div class="card result-section" id="result">
    <!-- 结果区动态填充 -->
  </div>

  <div class="card result-section" id="canvaSection">
    <!-- Canva 模块动态填充 -->
  </div>

  <p class="footer-hint">生成结果仅供参考,发布前请人工把关一遍内容真实性 · 模型: DeepSeek · 封面: Canva</p>

</div>

<div class="toast" id="toast">已复制</div>

<script>
const $ = (id) => document.getElementById(id);
const brandSel = $('brand');
const productSel = $('product');
const submitBtn = $('submit');
const resultEl = $('result');
const toast = $('toast');

let products = { brands: [] };
let activeType = '种草';

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1400);
}

function copy(text) {
  navigator.clipboard.writeText(text).then(() => showToast('已复制'));
}

// 加载产品列表
async function loadProducts() {
  try {
    const resp = await fetch('/api/products');
    products = await resp.json();
    if (!products.brands || !products.brands.length) {
      brandSel.innerHTML = '<option value="">(产品库为空)</option>';
      return;
    }
    brandSel.innerHTML = '<option value="">请选择品牌</option>' +
      products.brands.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
  } catch (e) {
    brandSel.innerHTML = '<option value="">加载失败</option>';
  }
}

brandSel.addEventListener('change', () => {
  const brand = products.brands.find(b => b.name === brandSel.value);
  if (!brand) {
    productSel.disabled = true;
    productSel.innerHTML = '<option value="">请先选择品牌</option>';
    return;
  }
  productSel.disabled = false;
  productSel.innerHTML = '<option value="">请选择产品</option>' +
    brand.products.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
});

// 文案类型切换
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
  });
});

submitBtn.addEventListener('click', generate);

async function generate() {
  if (!brandSel.value) return showToast('请先选择品牌');
  if (!productSel.value) return showToast('请先选择产品');

  submitBtn.disabled = true;
  submitBtn.textContent = '生成中...';
  resultEl.classList.add('visible');
  resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>AI 正在创作中,通常需要 10-30 秒...</div>';

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        brand: brandSel.value,
        product: productSel.value,
        copy_type: activeType,
        extra: $('extra').value.trim()
      })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      resultEl.innerHTML = `<div class="error">⚠️ 生成失败:${data.error || '未知错误'}</div>`;
      return;
    }
    renderResult(data);
    renderCanvaSection(data);
  } catch (e) {
    resultEl.innerHTML = `<div class="error">⚠️ 网络错误:${e.message}</div>`;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '一键生成文案';
  }
}

function renderResult(data) {
  const titles = data.titles || [];
  const body = data.body || '';
  const tags = data.tags || [];
  const tagsText = tags.join(' ');
  const fullText = (titles[0] || '') + '\n\n' + body + '\n\n' + tagsText;

  resultEl.innerHTML = `
    <div class="section-title">
      📌 标题(5 选 1,点击复制)
      <button class="copy-btn" onclick='copyAll()'>复制全文</button>
    </div>
    <ul class="title-list">
      ${titles.map((t, i) => `
        <li onclick='copy(${JSON.stringify(t)})'>
          <span><span class="num">${i+1}.</span><span class="text">${escapeHtml(t)}</span></span>
          <span class="mini-copy">点击复制</span>
        </li>
      `).join('')}
    </ul>

    <div class="section-title">
      📝 正文
      <button class="copy-btn" onclick='copy(${JSON.stringify(body)})'>复制正文</button>
    </div>
    <div class="body-box">${escapeHtml(body)}</div>

    <div class="section-title">
      🏷️ 话题标签
      <button class="copy-btn" onclick='copy(${JSON.stringify(tagsText)})'>复制标签</button>
    </div>
    <div class="tags-box">
      ${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
    </div>

    <button class="submit-btn" style="margin-top:24px;background:#fff;color:var(--primary);border:1px solid var(--primary);" onclick='document.getElementById("submit").click()'>
      🔄 重新生成一版
    </button>
  `;
  // 把工具函数暴露到全局供 onclick 用
  window.copy = copy;
  window.copyAll = () => copy(fullText);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

window.copy = copy;
loadProducts();

// ─── Canva 集成 ───
const canvaSectionEl = $('canvaSection');
let canvaTemplates = null;
let canvaSelectedTemplate = null;
let canvaSelectedTitle = '';
let canvaPhotoBase64 = '';   // 业务上传的封面原图(data URL)
let canvaPhotoName = '';

async function loadCanvaTemplates() {
  if (canvaTemplates !== null) return canvaTemplates;
  try {
    const resp = await fetch('/api/canva-templates');
    const data = await resp.json();
    if (!resp.ok || data.error) {
      throw new Error(data.error || 'unknown');
    }
    canvaTemplates = data.templates || [];
    return canvaTemplates;
  } catch (e) {
    canvaTemplates = [];
    throw e;
  }
}

async function renderCanvaSection(data) {
  const titles = data.titles || [];
  canvaSelectedTitle = titles[0] || '';
  canvaPhotoBase64 = '';
  canvaPhotoName = '';
  canvaSelectedTemplate = null;

  canvaSectionEl.classList.add('visible');
  canvaSectionEl.innerHTML = `
    <div class="section-title">🎨 一键去 Canva 做封面</div>
    <p style="color: var(--muted); font-size: 13px; margin: 0 0 14px;">
      上传你拍好的产品照 + 选标题 + 选模板,系统会自动把图和字塞进 Canva 模板,跳过去就能微调导出。
    </p>

    <label style="font-size:13px;color:var(--muted);">1. 上传产品照(JPG / PNG,3MB 以内)</label>
    <div id="canvaUploadArea">
      <div class="upload-zone" id="uploadZone">
        <div class="icon">📷</div>
        <div><strong>点击或拖拽图片到这里</strong></div>
        <p class="hint">建议 3:4 比例(900x1200 / 1080x1440),适配小红书封面</p>
        <input type="file" id="photoInput" accept="image/jpeg,image/png" />
      </div>
    </div>

    <label style="font-size:13px;color:var(--muted);">2. 选择封面主标题</label>
    <div class="canva-title-pick" id="canvaTitlePick">
      ${titles.map((t, i) => `
        <label>
          <input type="radio" name="canvaTitle" value="${escapeHtml(t)}" ${i === 0 ? 'checked' : ''} />
          <span>${escapeHtml(t)}</span>
        </label>
      `).join('')}
    </div>

    <label style="font-size:13px;color:var(--muted);">3. 选择模板</label>
    <div id="canvaTemplateArea">
      <div class="loading" style="padding:20px"><div class="spinner"></div>加载模板中...</div>
    </div>

    <button class="canva-btn" id="canvaGenBtn" disabled>请先完成上传 + 选模板</button>
    <div class="canva-status" id="canvaStatus"></div>
  `;

  document.querySelectorAll('input[name="canvaTitle"]').forEach(r => {
    r.addEventListener('change', e => canvaSelectedTitle = e.target.value);
  });
  $('canvaGenBtn').addEventListener('click', generateCover);

  // 上传区交互
  setupPhotoUpload();

  // 异步加载模板
  try {
    const templates = await loadCanvaTemplates();
    const area = $('canvaTemplateArea');
    if (!templates.length) {
      area.innerHTML = `<div class="error" style="font-size:13px">未找到 Canva 模板。请管理员先在 Canva Pro 里创建至少一个品牌模板(含 title 和 product_image 占位符)。</div>`;
      return;
    }
    area.innerHTML = `
      <div class="template-grid">
        ${templates.map(t => `
          <div class="template-card" data-id="${t.id}">
            ${t.thumbnail ? `<img src="${t.thumbnail}" alt="${escapeHtml(t.title || '')}">` : `<div style="aspect-ratio:3/4;background:#eee;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px">无预览图</div>`}
            <div class="name">${escapeHtml(t.title || t.id)}</div>
          </div>
        `).join('')}
      </div>
    `;
    document.querySelectorAll('.template-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.template-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        canvaSelectedTemplate = card.dataset.id;
        updateGenBtnState();
      });
    });
  } catch (e) {
    const msg = String(e.message || e);
    $('canvaTemplateArea').innerHTML = `<div class="error" style="font-size:13px">
      Canva 模板加载失败:${escapeHtml(msg)}<br>
      <small>常见原因:管理员还没完成首次授权,或 Vercel 上没配置 CANVA_REFRESH_TOKEN。访问 <a href="/api/canva-auth">/api/canva-auth</a> 走一次授权。</small>
    </div>`;
  }
}

function setupPhotoUpload() {
  const zone = $('uploadZone');
  const input = $('photoInput');
  if (!zone || !input) return;

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragging'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragging'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragging');
    if (e.dataTransfer.files.length) handlePhotoFile(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', e => {
    if (e.target.files.length) handlePhotoFile(e.target.files[0]);
  });
}

function handlePhotoFile(file) {
  if (!file.type.startsWith('image/')) return showToast('只能上传图片');
  if (file.size > 3 * 1024 * 1024) return showToast('图片过大,请压缩到 3MB 以内');

  const reader = new FileReader();
  reader.onload = e => {
    canvaPhotoBase64 = e.target.result;
    canvaPhotoName = file.name;
    renderPhotoPreview(file);
    updateGenBtnState();
  };
  reader.readAsDataURL(file);
}

function renderPhotoPreview(file) {
  const area = $('canvaUploadArea');
  const sizeKB = (file.size / 1024).toFixed(0);
  area.innerHTML = `
    <div class="photo-preview">
      <img src="${canvaPhotoBase64}" alt="预览" />
      <button class="remove" onclick="removePhoto()">×</button>
      <div class="photo-info">${escapeHtml(file.name)} · ${sizeKB} KB</div>
    </div>
  `;
}

function removePhoto() {
  canvaPhotoBase64 = '';
  canvaPhotoName = '';
  const area = $('canvaUploadArea');
  area.innerHTML = `
    <div class="upload-zone" id="uploadZone">
      <div class="icon">📷</div>
      <div><strong>点击或拖拽图片到这里</strong></div>
      <p class="hint">建议 3:4 比例(900x1200 / 1080x1440),适配小红书封面</p>
      <input type="file" id="photoInput" accept="image/jpeg,image/png" />
    </div>
  `;
  setupPhotoUpload();
  updateGenBtnState();
}
window.removePhoto = removePhoto;

function updateGenBtnState() {
  const btn = $('canvaGenBtn');
  if (!btn) return;
  if (canvaPhotoBase64 && canvaSelectedTemplate) {
    btn.disabled = false;
    btn.textContent = '🎨 生成封面并跳转 Canva';
  } else {
    btn.disabled = true;
    if (!canvaPhotoBase64) btn.textContent = '请先上传产品照';
    else if (!canvaSelectedTemplate) btn.textContent = '请选一个模板';
  }
}

async function generateCover() {
  if (!canvaPhotoBase64) return showToast('请先上传产品照');
  if (!canvaSelectedTemplate) return showToast('请先选模板');
  if (!canvaSelectedTitle) return showToast('请先选标题');

  const btn = $('canvaGenBtn');
  const status = $('canvaStatus');
  btn.disabled = true;
  btn.textContent = '生成中...';
  status.className = 'canva-status loading show';
  status.textContent = '正在调用 Canva,上传图片 + 填充模板中,约 10-30 秒...';

  try {
    const resp = await fetch('/api/canva-make-cover', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        template_id: canvaSelectedTemplate,
        title: canvaSelectedTitle,
        photo_base64: canvaPhotoBase64,
        photo_name: canvaPhotoName,
      })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      status.className = 'canva-status error show';
      status.textContent = '失败:' + (data.error || '未知错误');
      btn.disabled = false;
      btn.textContent = '🔁 重试';
      return;
    }
    status.className = 'canva-status success show';
    status.innerHTML = `✅ 已生成,正在打开 Canva...如果浏览器拦截了新标签页,<a href="${data.edit_url}" target="_blank">点这里手动打开</a>`;
    window.open(data.edit_url, '_blank');
    btn.disabled = false;
    btn.textContent = '🎨 再做一张';
  } catch (e) {
    status.className = 'canva-status error show';
    status.textContent = '网络错误: ' + e.message;
    btn.disabled = false;
    btn.textContent = '🔁 重试';
  }
}
</script>
</body>
</html>
