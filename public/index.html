<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小红书文案生成助手</title>
<style>
  :root {
    --primary: #ff2741;
    --primary-light: #ffe7ea;
    --bg: #faf9f7;
    --card: #ffffff;
    --text: #222;
    --muted: #6b6b6b;
    --border: #ececec;
    --shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 28px;
    margin: 0 0 6px;
    letter-spacing: 0.5px;
  }
  header h1 span { color: var(--primary); }
  header p {
    color: var(--muted);
    font-size: 14px;
    margin: 0;
  }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  select, textarea, input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    transition: border-color 0.15s;
  }
  select:focus, textarea:focus, input:focus {
    outline: none;
    border-color: var(--primary);
  }
  textarea { resize: vertical; min-height: 60px; }
  .types {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .type-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .type-btn:hover { border-color: var(--primary); }
  .type-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }
  .submit-btn:hover { opacity: 0.92; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
  .result-section {
    display: none;
  }
  .result-section.visible { display: block; }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    margin: 18px 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title:first-child { margin-top: 0; }
  .copy-btn {
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
  }
  .copy-btn:hover { background: #ffd1d6; }
  .title-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .title-list li {
    padding: 10px 12px;
    background: #fafafa;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
    border: 1px solid transparent;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .title-list li:hover {
    background: var(--primary-light);
    border-color: var(--primary);
  }
  .title-list .num {
    color: var(--primary);
    font-weight: 600;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .title-list .text { flex: 1; }
  .title-list .mini-copy {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .body-box {
    background: #fafafa;
    border-radius: 8px;
    padding: 14px 16px;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.8;
  }
  .tags-box {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    background: var(--primary-light);
    color: var(--primary);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
  }
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .loading .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--primary-light);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    background: #fff3f3;
    color: #c0392b;
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    border: 1px solid #ffd6d6;
  }
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  /* ── 登录覆盖层 ── */
  .login-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #fff4f5 0%, #fff 60%, #ffe4e7 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    padding: 20px;
  }
  .login-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    padding: 40px 32px;
    width: 100%;
    max-width: 420px;
  }
  .login-card h1 { font-size: 22px; margin: 0 0 6px; text-align: center; }
  .login-hint { color: var(--muted); text-align: center; margin: 0 0 24px; font-size: 13px; }
  .login-card label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; margin-top: 14px; }
  .login-card label:first-of-type { margin-top: 0; }
  .login-card select, .login-card input {
    width: 100%; padding: 11px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff;
  }
  .login-card select:focus, .login-card input:focus { outline: none; border-color: var(--primary); }
  .login-submit {
    width: 100%; padding: 14px; margin-top: 20px;
    background: var(--primary); color: white; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .login-submit:hover { opacity: 0.92; }
  .login-error {
    margin-top: 14px; padding: 10px 14px; background: #fef2f2;
    color: #991b1b; font-size: 13px; border-radius: 8px;
    display: none;
  }
  .login-error.show { display: block; }
  /* ── 顶部用户栏 ── */
  .user-bar {
    display: flex; align-items: center; gap: 10px;
    background: white; padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    position: sticky; top: 0; z-index: 100;
  }
  .user-bar .user-info { flex: 1; color: var(--text); font-weight: 500; }
  .user-bar button {
    padding: 6px 12px; border: 1px solid var(--border);
    border-radius: 16px; background: white; cursor: pointer; font-size: 12px;
  }
  .user-bar button:hover { background: #f5f5f5; }
  .user-bar .user-logout { color: var(--muted); }
  .user-bar .user-admin {
    background: linear-gradient(135deg, #fde68a, #fbbf24);
    border-color: #fbbf24; color: #78350f; font-weight: 600;
  }
  /* ── 模态框(历史 / 管理员)── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: flex-start; justify-content: center;
    z-index: 1500; padding: 30px 20px; overflow-y: auto;
  }
  .modal-overlay.show { display: flex; }
  .modal-card {
    background: white; border-radius: 14px;
    max-width: 900px; width: 100%; max-height: calc(100vh - 60px);
    display: flex; flex-direction: column;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { margin: 0; font-size: 18px; }
  .modal-close {
    background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--muted);
    width: 32px; height: 32px; line-height: 1;
  }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
  /* ── 版本徽章 + 更新公告 ── */
  .version-badge {
    display: inline-block; margin-left: 8px; padding: 2px 10px;
    font-size: 12px; font-weight: 600; line-height: 1.6;
    color: #fff; background: linear-gradient(135deg, #ff5a7a, #ff8a5a);
    border: none; border-radius: 999px; cursor: pointer;
    vertical-align: middle; box-shadow: 0 2px 6px rgba(255,90,122,0.35);
    transition: transform .15s, box-shadow .15s;
  }
  .version-badge:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(255,90,122,0.45); }
  .ver-block { margin-bottom: 28px; }
  .ver-block:last-child { margin-bottom: 0; }
  .ver-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .ver-num {
    font-size: 18px; font-weight: 700; color: var(--primary);
    background: #fff0f3; padding: 2px 12px; border-radius: 8px;
  }
  .ver-num.old { color: var(--muted); background: #f3f3f3; }
  .ver-date { font-size: 12px; color: var(--muted); }
  .ver-title { font-size: 15px; font-weight: 600; color: var(--text); margin: 8px 0 4px; }
  .ver-intro { font-size: 13px; color: var(--muted); margin: 0 0 14px; line-height: 1.6; }
  .ver-hl { display: flex; gap: 12px; padding: 10px 0; border-top: 1px solid var(--border); }
  .ver-hl:first-of-type { border-top: none; }
  .ver-hl-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
  .ver-hl-body { flex: 1; }
  .ver-hl-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .ver-hl-desc { font-size: 13px; color: var(--muted); line-height: 1.55; }
  .ver-tech {
    margin-top: 14px; background: #fafafa; border: 1px solid var(--border);
    border-radius: 10px; padding: 4px 0;
  }
  .ver-tech summary {
    cursor: pointer; padding: 10px 14px; font-size: 13px;
    font-weight: 600; color: var(--muted); list-style: none;
  }
  .ver-tech summary::-webkit-details-marker { display: none; }
  .ver-tech summary::before { content: '▸ '; }
  .ver-tech[open] summary::before { content: '▾ '; }
  .ver-tech ul { margin: 0; padding: 0 18px 12px 34px; }
  .ver-tech li { font-size: 12px; color: var(--muted); line-height: 1.7; }
  .ver-divider { border: none; border-top: 1px dashed var(--border); margin: 0 0 24px; }
  /* 管理员后台样式 */
  .admin-stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 24px;
  }
  @media (max-width: 600px) { .admin-stats-grid { grid-template-columns: repeat(2, 1fr); } }
  .admin-stat {
    padding: 16px; border-radius: 10px; text-align: center;
  }
  .admin-stat-num { font-size: 26px; font-weight: 700; }
  .admin-stat-label { font-size: 12px; margin-top: 4px; opacity: 0.85; }
  .admin-h3 {
    font-size: 14px; font-weight: 600; margin: 24px 0 10px;
    color: var(--text); display: flex; align-items: center; gap: 6px;
  }
  .admin-bars { display: flex; flex-direction: column; gap: 6px; }
  .admin-bar-row {
    display: flex; align-items: center; gap: 10px; font-size: 13px;
  }
  .admin-bar-label {
    flex-shrink: 0; width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .admin-bar-label small { font-size: 11px; }
  .admin-bar-count { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 30px; text-align: right; }
  .admin-recent {
    border: 1px solid var(--border); border-radius: 8px;
    max-height: 360px; overflow-y: auto;
  }
  .admin-recent-row {
    display: grid; grid-template-columns: 140px 80px 130px 1fr;
    gap: 8px; padding: 8px 12px; font-size: 12px;
    border-bottom: 1px solid #f5f5f5;
  }
  .admin-recent-row:last-child { border-bottom: none; }
  .admin-time { color: var(--muted); }
  .admin-action { color: var(--primary); font-weight: 500; }
  .admin-who { color: var(--text); }
  .admin-detail { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  @media (max-width: 600px) {
    .admin-bar-label { width: 90px; font-size: 11px; }
    .admin-recent-row { grid-template-columns: 1fr; gap: 2px; padding: 8px; }
  }
  /* 历史 grid */
  .history-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }
  @media (max-width: 600px) { .history-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; } }
  .history-card {
    border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
    cursor: pointer; background: white;
  }
  .history-card img {
    width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block;
  }
  .history-card .meta { padding: 6px 8px; font-size: 11px; color: var(--muted); }
  .history-card .meta .title { color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  /* ── 移动端适配 ── */
  @media (max-width: 600px) {
    .container { padding: 20px 14px 60px; }
    header h1 { font-size: 22px; }
    header { margin-bottom: 24px; }
    .card { padding: 18px 16px; }
    .login-card { padding: 30px 22px; }
    .user-bar { padding: 8px 14px; }
    .user-bar .user-info { font-size: 12px; }
    /* 关键:3 张生成结果在手机上也是 3 列 */
    .cover-results { grid-template-columns: 1fr 1fr 1fr !important; gap: 6px; }
    .cover-result-card .actions a { padding: 6px 4px; font-size: 11px; }
    /* 风格选择器 2 列就行 */
    .style-picker { grid-template-columns: 1fr 1fr; }
    .style-card { padding: 10px; }
    .style-card .style-name { font-size: 13px; }
    .style-card .style-desc { font-size: 10px; }
    /* 3 个字段输入框在手机上变成 1 列 */
    .cover-grid-3 { grid-template-columns: 1fr; }
  }
  /* 左右按钮 */
  .result-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 24px;
  }
  .submit-btn.ghost {
    background: #fff;
    color: var(--primary);
    border: 1px solid var(--primary);
  }
  /* 封面生成面板 */
  .cover-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) { .cover-grid-3 { grid-template-columns: 1fr; } }
  .cover-input {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .cover-input small { color: var(--muted); font-size: 11px; }
  .ai-import-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
  }
  .ai-import-btn:hover { opacity: 0.92; }
  .ai-import-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  /* 上传区 */
  .upload-zone {
    border: 2px dashed #ccc;
    border-radius: 10px;
    padding: 26px;
    text-align: center;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.15s;
    background: #fafafa;
  }
  .upload-zone:hover, .upload-zone.dragging {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .upload-zone input[type="file"] { display: none; }
  .upload-zone .hint { color: var(--muted); font-size: 13px; margin: 4px 0 0; }
  .upload-zone .icon { font-size: 32px; margin-bottom: 4px; opacity: 0.6; }
  .photo-preview {
    position: relative;
    margin-bottom: 14px;
    border-radius: 10px;
    overflow: hidden;
    background: #f0f0f0;
  }
  .photo-preview img {
    width: 100%;
    max-height: 320px;
    object-fit: contain;
    display: block;
  }
  .photo-preview .remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    color: white;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
  }
  .photo-info {
    padding: 6px 12px;
    font-size: 12px;
    color: var(--muted);
    background: white;
    text-align: center;
  }
  .gen-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #ff6b6b, #ff2741);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .gen-btn:disabled { background: #ccc; cursor: not-allowed; }
  .cover-status {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }
  .cover-status.show { display: block; }
  .cover-status.loading { background: #f0f9ff; color: #0369a1; border-left: 3px solid #0369a1; }
  .cover-status.success { background: #f0fdf4; color: #166534; border-left: 3px solid #16a34a; }
  .cover-status.error { background: #fef2f2; color: #991b1b; border-left: 3px solid #dc2626; }
  /* 结果图 */
  .cover-results {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 600px) { .cover-results { grid-template-columns: 1fr 1fr; } }
  .cover-result-card {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: white;
    position: relative;
  }
  .cover-result-card img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    cursor: zoom-in;
  }
  .cover-result-card .actions {
    display: flex;
    border-top: 1px solid var(--border);
  }
  .cover-result-card .actions a {
    flex: 1;
    padding: 8px;
    text-align: center;
    text-decoration: none;
    color: var(--primary);
    font-size: 13px;
    font-weight: 500;
    background: white;
  }
  .cover-result-card .actions a:hover { background: var(--primary-light); }
  /* 大图 lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
  .lightbox .close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    color: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
  }
  /* 风格选择卡片 */
  .style-picker {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) { .style-picker { grid-template-columns: 1fr; } }
  .style-card {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 12px 14px;
    border: 2px solid #e5e5e5;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    background: #fafafa;
  }
  .style-card:hover { border-color: var(--primary); background: #fff; }
  .style-card.active {
    border-color: var(--primary);
    background: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(255, 39, 65, 0.1);
  }
  .style-card .style-icon { font-size: 22px; }
  .style-card .style-name { font-weight: 600; font-size: 14px; }
  .style-card .style-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
  /* 旧 Canva 样式保留为引用 */
  .canva-title-pick {
    display: grid;
    gap: 8px;
    margin-bottom: 18px;
  }
  .canva-title-pick label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;

<script>
const $ = (id) => document.getElementById(id);
const brandSel = $('brand');
const productSel = $('product');
const submitBtn = $('submit');
const resultEl = $('result');
const toast = $('toast');

let products = { brands: [] };
let activeType = '种草';

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1400);
}

function copy(text) {
  // 优先用现代剪贴板 API(HTTPS 才能用)
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => showToast('已复制'))
      .catch(() => fallbackCopy(text));
    return;
  }
  // HTTP / 不支持的浏览器,降级到老式 execCommand
  fallbackCopy(text);
}

function fallbackCopy(text) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '-9999px';
    ta.style.left = '-9999px';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) {
      showToast('已复制');
    } else {
      showToast('复制失败,请手动选中复制');
    }
  } catch (e) {
    showToast('复制失败: ' + e.message);
  }
}

// 加载产品列表
async function loadProducts() {
  try {
    const resp = await fetch('/api/products');
    products = await resp.json();
    if (!products.brands || !products.brands.length) {
      brandSel.innerHTML = '<option value="">(产品库为空)</option>';
      return;
    }
    brandSel.innerHTML = '<option value="">请选择品牌</option>' +
      products.brands.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
  } catch (e) {
    brandSel.innerHTML = '<option value="">加载失败</option>';
  }
}

brandSel.addEventListener('change', () => {
  const brand = products.brands.find(b => b.name === brandSel.value);
  if (!brand) {
    productSel.disabled = true;
    productSel.innerHTML = '<option value="">请先选择品牌</option>';
    return;
  }
  productSel.disabled = false;
  productSel.innerHTML = '<option value="">请选择产品</option>' +
    brand.products.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
});

// 文案类型切换
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
  });
});

submitBtn.addEventListener('click', generate);

async function generate() {
  if (!brandSel.value) return showToast('请先选择品牌');
  if (!productSel.value) return showToast('请先选择产品');

  submitBtn.disabled = true;
  submitBtn.textContent = '生成中...';
  resultEl.classList.add('visible');
  resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>AI 正在创作中,通常需要 10-30 秒...</div>';

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        brand: brandSel.value,
        product: productSel.value,
        copy_type: activeType,
        extra: $('extra').value.trim()
      })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      resultEl.innerHTML = `<div class="error">⚠️ 生成失败:${data.error || '未知错误'}</div>`;
      return;
    }
    lastGenContext = {
      brand: brandSel.value,
      product: productSel.value,
      copy_type: activeType,
      extra: $('extra').value.trim(),
      titles: data.titles || [],
      body: data.body || '',
      tags: data.tags || [],
    };
    renderResult(data);
  } catch (e) {
    resultEl.innerHTML = `<div class="error">⚠️ 网络错误:${e.message}</div>`;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '一键生成文案';
  }
}

// 兜底清洗:把模型偶尔输出的字面量 \n 转义符 + markdown 标记清掉,
// 保证即使服务器还没重新部署,前端也能正常显示排版(小红书不渲染 markdown)
function cleanCopyText(s) {
  if (typeof s !== 'string') return s;
  s = s.replace(/\\r\\n/g, '\n').replace(/\\n/g, '\n')
       .replace(/\\r/g, '\n').replace(/\\t/g, '  ');
  s = s.replace(/\*\*(.+?)\*\*/g, '$1').replace(/__(.+?)__/g, '$1');
  s = s.replace(/^[ \t]*#{1,6}[ \t]*/gm, '');   // # 标题
  s = s.replace(/^[ \t]*>[ \t]?/gm, '');         // > 引用
  s = s.replace(/^[ \t]*[-*+][ \t]+/gm, '');     // - / * / + 列表
  s = s.replace(/\*\*/g, '');
  s = s.replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n');
  return s.trim();
}
function cleanInline(s) {
  if (typeof s !== 'string') return s;
  s = s.replace(/\\n/g, ' ').replace(/\\r/g, ' ').replace(/\\t/g, ' ');
  s = s.replace(/\*\*(.+?)\*\*/g, '$1').replace(/\*\*/g, '');
  return s.trim();
}

function renderResult(data) {
  const titles = (data.titles || []).map(cleanInline);
  const body = cleanCopyText(data.body || '');
  const tags = (data.tags || []).map(cleanInline);
  const tagsText = tags.join(' ');
  const fullText = (titles[0] || '') + '\n\n' + body + '\n\n' + tagsText;

  resultEl.innerHTML = `
    <div class="section-title">
      📌 标题(5 选 1,点击复制)
      <button class="copy-btn" onclick='copyAll()'>复制全文</button>
    </div>
    <ul class="title-list">
      ${titles.map((t, i) => `
        <li onclick='copy(${JSON.stringify(t)})'>
          <span><span class="num">${i+1}.</span><span class="text">${escapeHtml(t)}</span></span>
          <span class="mini-copy">点击复制</span>
        </li>
      `).join('')}
    </ul>

    <div class="section-title">
      📝 正文
      <button class="copy-btn" onclick='copy(${JSON.stringify(body)})'>复制正文</button>
    </div>
    <div class="body-box">${escapeHtml(body)}</div>

    <div class="section-title">
      🏷️ 话题标签
      <button class="copy-btn" onclick='copy(${JSON.stringify(tagsText)})'>复制标签</button>
    </div>
    <div class="tags-box">
      ${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
    </div>

    <div class="result-actions">
      <button class="submit-btn ghost" onclick='document.getElementById("submit").click()'>
        🔄 重新生成一版
      </button>
      <button class="submit-btn" onclick='openCoverPanel()'>
        🎨 生成封面图
      </button>
    </div>
  `;
  // 把工具函数暴露到全局供 onclick 用
  window.copy = copy;
  window.copyAll = () => copy(fullText);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

window.copy = copy;

// ─────────── 登录 / 用户系统 ───────────
const USER_KEY = 'xhsAgent:user';

// ─────────── 版本更新公告 ───────────

      { icon: '🎯', title: '封面风格自动匹配', desc: '不用再手动选封面风格了——选了文案类型,系统自动配最搭的封面调性,少点一步。' },
      { icon: '🖼️', title: '封面款式翻倍(30 套)', desc: '从 15 套版式扩到 30 套配色,一次生成 3 张张张不重样,挑选空间更大。' },

function renderVersionBody() {
  const html = CHANGELOG.map((v, idx) => {
    const hl = (v.highlights || []).map(h => `
      <div class="ver-hl">
        <div class="ver-hl-icon">${h.icon || '•'}</div>
        <div class="ver-hl-body">
          <div class="ver-hl-title">${escapeHtml(h.title)}</div>
          <div class="ver-hl-desc">${escapeHtml(h.desc)}</div>
        </div>
      </div>`).join('');
    const tech = (v.tech || []).map(t => `<li>${escapeHtml(t)}</li>`).join('');
    return `
      ${idx > 0 ? '<hr class="ver-divider">' : ''}
      <div class="ver-block">
        <div class="ver-head">
          <span class="ver-num${idx > 0 ? ' old' : ''}">${escapeHtml(v.version)}</span>
          <span class="ver-date">${escapeHtml(v.date)}</span>

        <div class="ver-title">${escapeHtml(v.title)}</div>

        ${hl}
        ${tech ? `<details class="ver-tech"><summary>技术明细(给好奇的同学)</summary><ul>${tech}</ul></details>` : ''}
      </div>`;
  }).join('');
  $('versionBody').innerHTML = html;
}

function openVersionModal() {
  renderVersionBody();
  $('versionModal').classList.add('show');
  // 看过就记下当前版本号,下次不再自动弹
  try { localStorage.setItem(SEEN_VERSION_KEY, APP_VERSION); } catch (_) {}
}
window.openVersionModal = openVersionModal;

function closeVersionModal(e) {
  if (e && e.target.id !== 'versionModal' && e.target.classList && !e.target.classList.contains('modal-close')) return;
  $('versionModal').classList.remove('show');
}
window.closeVersionModal = closeVersionModal;

function maybeShowVersionModal() {
  let seen = null;
  try { seen = localStorage.getItem(SEEN_VERSION_KEY); } catch (_) {}
  if (seen !== APP_VERSION) {
    // 登录后稍微延迟弹,体验更顺
    setTimeout(openVersionModal, 600);
  }
}
let currentUser = null;       // {department, name, emp_id, is_admin}
let usersByDept = {};         // {dept: [{name}]} 给登录下拉用

function getCurrentUser() {
  try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); }
  catch (_) { return null; }
}

async function initAuth() {
  currentUser = getCurrentUser();
  if (currentUser && currentUser.emp_id) {
    showApp();
  } else {
    await loadDepartments();
    showLogin();
  }
}

async function loadDepartments() {
  try {
    const resp = await fetch('/api/login');
    const data = await resp.json();
    usersByDept = data.users_by_dept || {};
    const deptSel = $('loginDept');
    deptSel.innerHTML = '<option value="">请选择部门</option>' +
      (data.departments || []).map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
  } catch (e) {
    console.error('加载部门失败', e);
  }
}

function showLogin() {
  $('loginOverlay').style.display = 'flex';
  $('userBar').style.display = 'none';
  document.querySelector('.container').style.display = 'none';
}

function showApp() {
  $('loginOverlay').style.display = 'none';
  $('userBar').style.display = 'flex';
  document.querySelector('.container').style.display = 'block';
  $('userInfoLabel').textContent =
    `${currentUser.department} · ${currentUser.name}（工号 ${currentUser.emp_id}）`;
  if (currentUser.is_admin) $('userAdminBtn').style.display = '';
  // 真正去加载产品
  loadProducts();
  // 有新版本时首次自动弹更新公告
  maybeShowVersionModal();
}

document.addEventListener('DOMContentLoaded', () => {
  initAuth();

  // 部门联动姓名下拉
  $('loginDept').addEventListener('change', e => {
    const nameSel = $('loginName');
    const users = usersByDept[e.target.value] || [];
    if (!users.length) {
      nameSel.disabled = true;
      nameSel.innerHTML = '<option value="">请先选部门</option>';
      return;
    }
    nameSel.disabled = false;
    nameSel.innerHTML = '<option value="">请选择姓名</option>' +
      users.map(u => `<option value="${escapeHtml(u.name)}">${escapeHtml(u.name)}</option>`).join('');
  });

  $('loginSubmit').addEventListener('click', doLogin);
  $('loginEmpId').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
});

async function doLogin() {
  const dept = $('loginDept').value;
  const name = $('loginName').value;
  const empId = $('loginEmpId').value.trim();
  const err = $('loginError');
  err.classList.remove('show');
  if (!dept || !name || !empId) {
    err.textContent = '请把部门、姓名、工号都填完整';
    err.classList.add('show');
    return;
  }
  $('loginSubmit').disabled = true;
  $('loginSubmit').textContent = '验证中...';
  try {
    const resp = await fetch('/api/login', {

  }).catch(err => {

// 浏览器端压缩图片到 1200px 最长边 / JPEG 0.85
// 把 2-5 MB 的原图压到 200-500 KB,大幅降低跨国上传超时
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onerror = () => reject(new Error('图片读取失败'));
    img.onload = () => {
      const MAX_DIM = 1200;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX_DIM || h > MAX_DIM) {
        if (w >= h) { h = Math.round(h * MAX_DIM / w); w = MAX_DIM; }
        else        { w = Math.round(w * MAX_DIM / h); h = MAX_DIM; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      // 高质量缩放
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        if (!blob) return reject(new Error('canvas 转 blob 失败'));
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('读取压缩结果失败'));
        reader.onload = e => resolve({
          dataUrl: e.target.result,
          sizeKB: Math.round(blob.size / 1024),
        });
        reader.readAsDataURL(blob);
      }, 'image/jpeg', 0.85);
    };
    img.src = URL.createObjectURL(file);
  });
}

      method: 'POST',

    if (!resp.ok || data.error) {
      status.className = 'cover-status error show';
      status.innerHTML = '失败:' + escapeHtml(data.error || '未知错误') +
        (data.details ? '<br><small>' + escapeHtml(JSON.stringify(data.details)) + '</small>' : '');
      btn.disabled = false;
      btn.textContent = '🔁 重试';
      return;
    }

    const images = data.images || [];
    const errs = data.errors || [];

    let statusMsg = `✅ 成功生成 ${images.length} 张`;
    if (errs.length) statusMsg += `,${errs.length} 张失败(已忽略)`;
    status.className = 'cover-status success show';
    status.textContent = statusMsg;

    // 存到历史(localStorage)

        copy_type: activeType,

        images: images,
      });

    btn.textContent = '🔁 再生成 3 张';
  } catch (e) {
    status.className = 'cover-status error show';
    status.textContent = '网络错误: ' + e.message;
    btn.disabled = false;
    btn.textContent = '🔁 重试';
  }
}

function renderCoverResults(images) {
  if (!images.length) return;
  coverResultEl.classList.add('visible');
  coverResultEl.innerHTML = `
    <div class="section-title">🖼️ 生成结果(点缩略图看大图,点"下载"保存)</div>
    <div class="cover-results">
      ${images.map((url, i) => `
        <div class="cover-result-card">
          <img src="${escapeHtml(url)}" alt="封面候选 ${i+1}" onclick="openLightbox('${escapeHtml(url)}')" />
          <div class="actions">
            <a href="${escapeHtml(url)}" download="cover_${i+1}.png" target="_blank">⬇ 下载</a>
            <a href="${escapeHtml(url)}" target="_blank">🔍 大图</a>
          </div>
        </div>
      `).join('')}
    </div>
    <p style="color:var(--muted);font-size:12px;margin:14px 0 0;">
      💡 AI 生图对中文文字识别仍不完美,可能出现错字。如果 3 张都不理想,点上方"再生成 3 张"重试。
    </p>
    <button class="submit-btn ghost" style="margin-top:14px" onclick="openHistoryModal()">
      📂 查看全部生成结果
    </button>
  `;
  coverResultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openLightbox(url) {
  const lb = $('lightbox');
  $('lightboxImg').src = url;
  lb.classList.add('show');
}
window.openLightbox = openLightbox;
function closeLightbox() { $('lightbox').classList.remove('show'); }
window.closeLightbox = closeLightbox;
</script>
</body>
</html>
