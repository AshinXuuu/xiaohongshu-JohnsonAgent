<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>管理员后台 · 小红书文案生成助手</title>
<link rel="stylesheet" href="/assets/app.css" />
<style>
  :root {
    /* 主色:深 slate,克制不抢眼 */
    --primary: #1e293b;
    --primary-soft: #f1f5f9;
    --primary-hover: #0f172a;

    /* 背景:暖白(stone-50),比纯白更舒服,比 cool gray 不冰冷 */
    --bg: #fafaf9;
    --card: #ffffff;

    /* 文字三级:深、中、浅 */
    --text: #18181b;
    --text-soft: #3f3f46;
    --muted: #71717a;

    /* 边框:两级,几乎不可见 */
    --border: #e4e4e7;
    --border-soft: #f4f4f5;

    /* 阴影:两级,都很轻 */
    --shadow:    0 1px 2px rgba(15,23,42,0.04);
    --shadow-md: 0 4px 12px rgba(15,23,42,0.05);

    /* 强调色:统一中等饱和,用于图表 / 小色点 */
    --c-indigo:  #6366f1;
    --c-emerald: #10b981;
    --c-amber:   #f59e0b;
    --c-rose:    #f43f5e;
    --c-violet:  #8b5cf6;
    --c-cyan:    #06b6d4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    font-size: 13.5px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "tnum" 1, "ss01" 1;
  }

  /* 顶部工具栏 */
  .topbar {
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border-soft);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.01em;
  }
  .topbar h1 .badge {
    background: var(--primary-soft);
    color: var(--text-soft);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 500;
    letter-spacing: 0;
  }
  .topbar .spacer { flex: 1; }
  .topbar .meta {
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .topbar button, .topbar a.btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 7px;
    font-size: 12.5px;
    cursor: pointer;
    color: var(--text-soft);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .topbar button:hover, .topbar a.btn:hover {
    background: var(--primary-soft);
    border-color: var(--border);
    color: var(--text);
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px;
  }

  /* KPI 卡片网格 */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  @media (max-width: 1000px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px)  { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
  .kpi {
    background: var(--card);
    border-radius: 10px;
    padding: 16px 18px;
    border: 1px solid var(--border-soft);
    box-shadow: var(--shadow);
    transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
    position: relative;
  }
  .kpi:hover {
    border-color: var(--border);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  /* 小色点放右上角,做视觉锚定但不抢戏 */
  .kpi::before {
    content: '';
    position: absolute;
    top: 16px; right: 16px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--c-indigo);
    opacity: 0.85;
  }
  .kpi.b-blue::before   { background: var(--c-indigo); }
  .kpi.b-green::before  { background: var(--c-emerald); }
  .kpi.b-amber::before  { background: var(--c-amber); }
  .kpi.b-purple::before { background: var(--c-violet); }
  .kpi.b-pink::before   { background: var(--c-rose); }
  .kpi-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .kpi-value {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .kpi-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* 卡片 */
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px 22px;
    border: 1px solid var(--border-soft);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 13.5px;
    font-weight: 600;
    margin: 0 0 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
    letter-spacing: -0.005em;
  }
  .card-title .hint {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0;
  }

  /* 双栏布局 */
  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .row-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  @media (max-width: 900px) {
    .row-2, .row-3 { grid-template-columns: 1fr; }
  }

  /* ─── 移动端专项 ─── */
  @media (max-width: 600px) {
    body { font-size: 13px; }
    .topbar { padding: 12px 16px; gap: 8px; flex-wrap: wrap; }
    .topbar h1 { font-size: 14px; }
    .topbar h1 .badge { font-size: 10px; padding: 1px 6px; }
    .topbar .meta { font-size: 11.5px; width: 100%; order: 99; padding-top: 4px; }
    .topbar button, .topbar a.btn { padding: 5px 10px; font-size: 12px; }

    .container { padding: 14px 12px; }
    .kpi { padding: 13px 14px; }
    .kpi-label { font-size: 11px; }
    .kpi-value { font-size: 20px; }
    .kpi-sub { font-size: 10.5px; }
    .kpi::before { top: 13px; right: 13px; }

    .card { padding: 14px 14px; border-radius: 10px; }
    .card-title { font-size: 13px; margin-bottom: 12px; }

    .chart-box       { height: 220px; }
    .chart-box.tall  { height: 280px; }
    .chart-box.short { height: 180px; }

    .rank-row { grid-template-columns: 22px 1fr 42px; gap: 8px; font-size: 12.5px; }
    .rank-bar-text { font-size: 11.5px; padding: 0 9px; }
    .rank-bar-text small { display: none; }

    /* 明细表:横向滚动,字段缩窄 */
    .table-toolbar { gap: 6px; }
    .table-toolbar input, .table-toolbar select, .export-btn { font-size: 12px; padding: 6px 9px; }
    .table-toolbar .count { font-size: 11px; }
    .detail-table { font-size: 12px; }
    .detail-table th, .detail-table td { padding: 8px 10px; }
    .detail-table th { font-size: 10.5px; }
    /* 防止文字撑爆 */
    .pill { font-size: 10.5px; padding: 1px 6px; }
  }

  /* 图表容器 */
  .chart-box {
    position: relative;
    height: 280px;
  }
  .chart-box.tall  { height: 360px; }
  .chart-box.short { height: 220px; }

  /* 排行条形(纯 CSS 不用 Chart) */
  .rank-list { display: flex; flex-direction: column; gap: 8px; }
  .rank-row {
    display: grid;
    grid-template-columns: 24px 1fr 50px;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .rank-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--primary-soft); color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }
  /* 前三名:克制的奖牌色,不用渐变,平面更高级 */
  .rank-row:nth-child(1) .rank-num { background: #18181b; color: #fff; }
  .rank-row:nth-child(2) .rank-num { background: #52525b; color: #fff; }
  .rank-row:nth-child(3) .rank-num { background: #a1a1aa; color: #fff; }
  .rank-bar-wrap {
    position: relative;
    height: 24px;
    background: var(--primary-soft);
    border-radius: 5px;
    overflow: hidden;
  }
  .rank-bar-fill {
    height: 100%;
    border-radius: 5px;
    /* 用淡靛蓝作为底色,克制不刺眼 */
    background: linear-gradient(90deg, rgba(99,102,241,0.18), rgba(99,102,241,0.32));
    transition: width 0.4s ease;
  }
  .rank-bar-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 12.5px;
    color: var(--text);
    z-index: 2;
    font-weight: 500;
  }
  .rank-bar-text small { color: var(--muted); margin-left: 6px; font-size: 11px; font-weight: 400; }
  .rank-count {
    color: var(--text);
    font-weight: 600;
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }

  /* 明细表 */
  .table-toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .table-toolbar input, .table-toolbar select {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 12.5px;
    background: white;
    font-family: inherit;
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .table-toolbar input:focus, .table-toolbar select:focus {
    outline: none;
    border-color: #a5b4fc;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
  }
  .table-toolbar .count {
    margin-left: auto;
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .export-btn {
    padding: 7px 12px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 7px;
    cursor: pointer;
    font-size: 12.5px;
    color: var(--text-soft);
    font-weight: 500;
    font-family: inherit;
    transition: all 0.15s;
  }
  .export-btn:hover {
    background: var(--primary-soft);
    border-color: var(--border);
    color: var(--text);
  }
  .detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .detail-table thead { background: var(--primary-soft); }
  .detail-table th {
    text-align: left;
    padding: 11px 14px;
    font-size: 11.5px;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--primary-soft);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .detail-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border-soft);
    vertical-align: top;
  }
  .detail-table tr:hover { background: #fafafa; }
  .detail-table tr:last-child td { border-bottom: none; }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11.5px;
    background: var(--primary-soft);
    color: var(--text-soft);
    font-weight: 500;
    border: 1px solid var(--border-soft);
  }
  /* 动作类型 pill 用克制的语义色,饱和度统一 */
  .pill.generate         { background: #eef2ff; color: #4338ca; border-color: transparent; }
  .pill.cover_generate   { background: #ecfeff; color: #155e75; border-color: transparent; }
  .pill.cover_fields     { background: #f5f3ff; color: #6d28d9; border-color: transparent; }
  .pill.login            { background: #ecfdf5; color: #047857; border-color: transparent; }
  .pill.copy             { background: #fffbeb; color: #92400e; border-color: transparent; }
  .pill.generate_failed  { background: #fef2f2; color: #b91c1c; border-color: transparent; }

  .table-scroll {
    max-height: 540px;
    overflow-y: auto;
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    background: white;
  }

  /* 状态条 */
  .loading, .empty, .deny {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .loading .spinner {
    width: 26px; height: 26px;
    border: 2.5px solid var(--primary-soft);
    border-top-color: var(--c-indigo);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .deny {
    background: #fef2f2;
    color: #991b1b;
    border-radius: 12px;
    margin: 60px auto;
    max-width: 460px;
    padding: 40px 30px;
  }
  .deny h2 { margin: 0 0 8px; font-size: 18px; }
  .deny a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
  }

  /* 应用切换 Tab(全部 / 文案助手 / 问答助手)*/
  .app-tabs {
    display: inline-flex;
    gap: 2px;
    background: var(--primary-soft);
    border-radius: 9px;
    padding: 3px;
    margin-bottom: 18px;
  }
  .app-tab {
    padding: 7px 16px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    border-radius: 7px;
    font-weight: 500;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .app-tab:hover { color: var(--text-soft); }
  .app-tab.active {
    background: white;
    color: var(--text);
    box-shadow: var(--shadow);
  }
  .app-tab .count {
    margin-left: 6px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
  }
  .app-tab.active .count { color: var(--accent); }
  /* 顶栏下方的管理控制条(刷新 + 更新时间) */
  .admin-subbar {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 12px; padding: 14px 24px 0;
  }
  .admin-subbar .meta { color: var(--muted); font-size: 12.5px; }
</style>
</head>
<body>

<!-- 顶部工具栏 -->
<header id="appTopbar"></header>
<div class="admin-subbar">
  <span class="meta" id="updateTime"></span>
  <a class="btn" href="/admin-users.html">用户管理</a>
  <a class="btn" href="/admin-products.html">产品管理</a>
  <a class="btn" href="/admin-kos.html">KOS 任务</a>
  <a class="btn" href="/admin-log.html">操作日志</a>
  <button class="btn" onclick="loadStats()">刷新</button>
</div>

<div class="container" id="mainArea">
  <div class="loading">
    <div class="spinner"></div>
    正在拉取全公司用量数据 ...
  </div>
</div>

<!-- Chart.js (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script src="/assets/app.js"></script>
<script>
const $ = id => document.getElementById(id);
const USER_KEY = 'xhsAgent:user';  // 必须和 index.html 第 1043 行保持一致
const ACTION_LABEL = {
  generate: '文案生成',
  cover_fields: '一键导入',
  cover_generate: '封面生成',
  login: '登录',
  copy: '复制',
  generate_failed: '生成失败',
};

// ─── 工具 ─────────────────────────────────────────────
function getCurrentUser() {
  try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); }
  catch (_) { return null; }
}
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function fmtTime(ms) {
  if (!ms) return '';
  const d = new Date(ms);
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtFullTime(ms) {
  if (!ms) return '';
  const d = new Date(ms);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

// ─── 鉴权:含 24h 会话过期 ─────────────────────────────
const SESSION_TTL_MS = 24 * 60 * 60 * 1000;
const me = getCurrentUser();
const sessionValid = me && me.emp_id && me.loginAt && (Date.now() - me.loginAt) < SESSION_TTL_MS;
if (!sessionValid) {
  // 没登录或过期 → 清掉并跳门户
  if (me) localStorage.removeItem(USER_KEY);
  location.replace('/');
} else {
  App.mountTopbar();
}
function logoutAdmin() {
  if (!confirm('确定要退出登录吗?')) return;
  localStorage.removeItem(USER_KEY);
  location.href = '/';
}
window.logoutAdmin = logoutAdmin;

if (me && !['org_admin', 'super_admin'].includes(App.roleOf(me))) {
  document.getElementById('mainArea').innerHTML = `
    <div class="deny">
      <h2>无权访问</h2>
      <p>本页面仅向管理员开放。当前账号:${escapeHtml(me.name)}。</p>
      <p><a href="/">← 返回工作台</a></p>
    </div>
  `;
}

// ─── 数据加载 ─────────────────────────────────────────
let __state = { data: null, charts: {}, app: 'overview', days: 30 };

function ctrlBar() {
  const a = __state.app;
  const opts = [[7, '近7天'], [30, '近30天'], [90, '近90天'], [0, '全部']];
  const tab = (k, l) => `<button class="app-tab ${a === k ? 'active' : ''}" onclick="switchApp('${k}')">${l}</button>`;
  return `<div class="app-tabs" style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">
    ${tab('overview', '总览')}${tab('all', '全部')}${tab('generate', '文案助手')}${tab('qa', '问答助手')}${tab('library', '资料库')}${tab('kos', 'KOS 任务')}
    <span style="flex:1"></span>
    <select onchange="setDays(this.value)" style="padding:5px 9px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:white">
      ${opts.map(([v, l]) => `<option value="${v}" ${__state.days == v ? 'selected' : ''}>${l}</option>`).join('')}
    </select>
  </div>`;
}
function setDays(v) { __state.days = parseInt(v); loadStats(); }
window.setDays = setDays;

function modCard(label, val, color) {
  return `<div style="border:1px solid var(--border-soft);border-radius:10px;padding:12px 14px">
    <div style="font-size:12px;color:var(--muted)">${label}</div>
    <div style="font-size:22px;font-weight:700;color:${color}">${val}</div></div>`;
}

function renderOverview(o) {
  const m = o.modules || {};
  $('mainArea').innerHTML = `
    ${ctrlBar()}
    <div class="kpi-grid">
      <div class="kpi b-blue"><div class="kpi-label">今日活跃人数</div><div class="kpi-value">${o.active_today || 0}</div><div class="kpi-sub">今天用过平台的人</div></div>
      <div class="kpi b-green"><div class="kpi-label">本周活跃人数</div><div class="kpi-value">${o.active_week || 0}</div><div class="kpi-sub">近 7 天去重</div></div>
      <div class="kpi b-amber"><div class="kpi-label">范围内活跃人数</div><div class="kpi-value">${o.active_range || 0}</div><div class="kpi-sub">当前时间范围去重</div></div>
    </div>
    <div class="card"><div class="card-title">各模块使用(时间范围内)</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px">
        ${modCard('小红书生成', m.content || 0, '#be185d')}
        ${modCard('销售问答', m.qa || 0, '#4338ca')}
        ${modCard('资料下载', m.library || 0, '#0f766e')}
        ${modCard('KOS 发布笔记', m.kos || 0, '#b45309')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px">
      <div class="card"><div class="card-title">每日活跃趋势</div><div class="chart-box"><canvas id="ovDaily"></canvas></div></div>
      <div class="card"><div class="card-title">最活跃的人(总操作)</div><div id="ovRank"></div></div>
    </div>`;

async function loadStats() {
  if (!me || !['org_admin', 'super_admin'].includes(App.roleOf(me))) return;
  $('mainArea').innerHTML = `
    <div class="loading"><div class="spinner"></div>正在拉取全公司用量数据 ...</div>
  `;
  try {
    const resp = await fetch('/api/admin-stats', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        app: __state.app,
        days: __state.days,
        _user: {
          department: me.department,
          name: me.name,
          emp_id: me.emp_id,
        },
      }),
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      $('mainArea').innerHTML = `<div class="card" style="color:#991b1b">${escapeHtml(data.error || '加载失败')}</div>`;
      return;
    }
    if (data.kv_configured === false) {
      $('mainArea').innerHTML = `<div class="card" style="color:#92400e;background:#fef3c7">${escapeHtml(data.message || '数据库未就绪')}</div>`;
      return;
    }
    __state.data = data;
    render(data);
    $('updateTime').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');
  } catch (e) {
    $('mainArea').innerHTML = `<div class="card" style="color:#991b1b">网络错误:${escapeHtml(e.message)}</div>`;
  }
}

// ─── 排行渲染 ────────────────────────────────────────
function renderRank(id, items) {
  const el = $(id);
  if (!el) return;
  if (!items.length) {
    el.innerHTML = '<div style="color:var(--muted);padding:20px;text-align:center">暂无数据</div>';
    return;
  }
  const max = Math.max(...items.map(x => x.count), 1);
  el.innerHTML = items.map((x, i) => {
    const pct = Math.max(4, (x.count / max) * 100);
    return `
      <div class="rank-row">
        <div class="rank-num">${i + 1}</div>
        <div class="rank-bar-wrap">
          <div class="rank-bar-fill" style="width:${pct}%"></div>
          <div class="rank-bar-text">
            ${escapeHtml(x.label)}
            ${x.sub ? `<small>· ${escapeHtml(x.sub)}</small>` : ''}
          </div>
        </div>
        <div class="rank-count">${x.count}</div>
      </div>
    `;
  }).join('');
}

// ─── 图表 ────────────────────────────────────────────
// 配色原则:中等饱和度、统一明度、视觉上"成套"
const PALETTE = ['#6366f1', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6', '#06b6d4', '#84cc16', '#ec4899', '#0ea5e9', '#d97706'];
// 文案类型固定语义色:种草=玫红 / 场景=靛蓝 / 干货=翡翠 / 促销=琥珀
const copyTypePalette = { '种草': '#f43f5e', '场景': '#6366f1', '干货': '#10b981', '促销': '#f59e0b' };
const actionPalette = ['#6366f1', '#10b981', '#8b5cf6', '#06b6d4', '#f59e0b', '#f43f5e', '#a1a1aa'];
const stylePalette = ['#8b5cf6', '#06b6d4', '#10b981', '#f59e0b', '#f43f5e'];

function mapActionLabel(arr) {
  return arr.map(x => ({ ...x, key: ACTION_LABEL[x.key] || x.key }));
}

function drawDailyChart(daily) {
  const sorted = [...daily].sort((a, b) => a.key.localeCompare(b.key));
  const labels = sorted.map(x => x.key.slice(5));  // MM-DD
  const data = sorted.map(x => x.count);
  if (!labels.length) {
    document.getElementById('chartDaily').parentElement.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }
  __state.charts.daily = new Chart($('chartDaily'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '操作量',
        data,
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99, 102, 241, 0.10)',
        fill: true,
        tension: 0.35,
        pointRadius: 2.5,
        pointHoverRadius: 6,
        pointBackgroundColor: '#6366f1',
        pointBorderColor: '#fff',
        pointBorderWidth: 1.5,
        borderWidth: 2,
      }]
    },
    options: chartCommonOptions({ y: { beginAtZero: true, ticks: { precision: 0 } } })
  });
}

function drawDoughnut(canvasId, arr, paletteOrMap) {
  const el = $(canvasId);
  if (!el) return;
  if (!arr.length) {
    el.parentElement.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }
  const labels = arr.map(x => x.key);
  const data = arr.map(x => x.count);
  const colors = Array.isArray(paletteOrMap)
    ? labels.map((_, i) => paletteOrMap[i % paletteOrMap.length])
    : labels.map((l, i) => paletteOrMap[l] || PALETTE[i % PALETTE.length]);
  __state.charts[canvasId] = new Chart(el, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '60%',
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, padding: 10, font: { size: 12 } } },
        tooltip: { callbacks: {
          label: ctx => {
            const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
            const pct = total > 0 ? ((ctx.parsed/total)*100).toFixed(1) : 0;
            return ` ${ctx.label}: ${ctx.parsed} (${pct}%)`;
          }
        }}
      }
    }
  });
}

function drawBarH(canvasId, arr, color) {
  const el = $(canvasId);
  if (!el) return;
  if (!arr.length) {
    el.parentElement.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }
  const top = arr.slice(0, 10);
  __state.charts[canvasId] = new Chart(el, {
    type: 'bar',
    data: {
      labels: top.map(x => x.key),
      datasets: [{
        label: '次数',
        data: top.map(x => x.count),
        backgroundColor: top.map((_, i) => PALETTE[i % PALETTE.length]),
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { precision: 0 } }
      }
    }
  });
}

function drawHourChart(byHour) {
  const buckets = new Array(24).fill(0);
  byHour.forEach(x => { if (x.key >= 0 && x.key < 24) buckets[x.key] = x.count; });
  const el = $('chartHour');
  const peak = Math.max(...buckets, 1);
  __state.charts.hour = new Chart(el, {
    type: 'bar',
    data: {
      labels: buckets.map((_, h) => h + ':00'),
      datasets: [{
        label: '操作次数',
        data: buckets,
        // 颜色深浅随热度,基色用 indigo(克制不刺眼)
        backgroundColor: buckets.map(c => `rgba(99, 102, 241, ${Math.min(0.9, 0.15 + c / peak * 0.75)})`),
        borderRadius: 3,
      }]
    },
    options: chartCommonOptions({ y: { beginAtZero: true, ticks: { precision: 0 } } })
  });
}

function chartCommonOptions(scales) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: scales || {}
  };
}

async function loadDetail() {

    const resp = await fetch('/api/admin-events', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },

        app: __state.app, days: __state.days, keyword: __state.detailKw, page: __state.detailPage,

    const d = await resp.json();

  }

window.detailGoto = detailGoto;

function renderDetailRows(rows) {
  const tBody = $('detailBody');
  if (!rows.length) { tBody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:30px">没有记录</td></tr>`; return; }
  tBody.innerHTML = rows.map(r => {
    const action = r.action || 'unknown';
    const bits = [];
    if (r.details?.brand)     bits.push(`<span class="pill">${escapeHtml(r.details.brand)}</span>`);
    if (r.details?.product)   bits.push(`<span class="pill">${escapeHtml(r.details.product)}</span>`);
    if (r.details?.copy_type) bits.push(`<span class="pill">${escapeHtml(r.details.copy_type)}</span>`);
    if (r.details?.file)      bits.push(`<span class="pill">${escapeHtml(r.details.file)}</span>`);
    if (r.details?.reason)    bits.push(`<span style="color:#991b1b">${escapeHtml(r.details.reason).slice(0, 80)}</span>`);
    return `<tr>
      <td style="color:var(--muted);font-variant-numeric:tabular-nums">${escapeHtml(fmtTime(r.time))}</td>
      <td><span class="pill ${escapeHtml(action)}">${escapeHtml(ACTION_LABEL[action] || action)}</span></td>
      <td>${escapeHtml(r.user?.name || '未知')}<br><small style="color:var(--muted)">${escapeHtml(r.user?.department || '')}</small></td>
      <td>${bits.join(' ') || '<span style="color:var(--muted)">—</span>'}</td>
    </tr>`;
  }).join('');
}

// ─── CSV 导出 ────────────────────────────────────────
function exportCSV() {
  const rows = __state.detailRows || [];
  if (!rows.length) { alert('暂无数据可导出'); return; }
  const header = ['时间', '动作', '员工号', '姓名', '部门', '品牌', '产品', '文案类型', '风格', '失败原因'];
  const lines = [header.join(',')];
  rows.forEach(r => {
    const cell = v => {
      const s = (v === null || v === undefined) ? '' : String(v);
      return /[,"\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    };
    lines.push([
      fmtFullTime(r.time),
      ACTION_LABEL[r.action] || r.action,
      r.user?.emp_id,
      r.user?.name,
      r.user?.department,
      r.details?.brand,
      r.details?.product,
      r.details?.copy_type,
      r.details?.style,
      r.details?.reason,
    ].map(cell).join(','));
  });
  const csv = '﻿' + lines.join('\n');  // BOM 防 Excel 乱码
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `agent-usage-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
window.exportCSV = exportCSV;

// ─── 启动 ─────────────────────────────────────────────
if (me && me.is_admin) {
  loadStats();
  // 每 5 分钟自动刷新
  setInterval(loadStats, 5 * 60 * 1000);
}
